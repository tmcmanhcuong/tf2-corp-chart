{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: false
metadata:
  {{- $_ := set . "serviceAccount" .Values.serviceAccount }}
  name: {{ include "techx-corp.serviceAccountName" . }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.annotations }}
  annotations:
    {{- range $key, $value := .Values.serviceAccount.annotations }}
    {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- define "techx-corp.componentServiceAccount" -}}
{{- $componentServiceAccount := .componentServiceAccount | default dict -}}
{{- $create := true -}}
{{- if hasKey $componentServiceAccount "create" -}}
{{- $create = $componentServiceAccount.create -}}
{{- end -}}
{{- if $create }}
---
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: false
metadata:
  {{- if .componentServiceAccount }}
  name: {{ include "techx-corp.serviceAccountName" . }}
  {{- else }}
  name: {{ .name }}
  {{- end }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  {{- if $componentServiceAccount.annotations }}
  annotations:
    {{- range $key, $value := $componentServiceAccount.annotations }}
    {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
