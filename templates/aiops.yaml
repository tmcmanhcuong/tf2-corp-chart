{{- if .Values.aiops.enabled }}
{{- $name := "aiops" }}
{{- $serviceAccountName := default $name .Values.aiops.serviceAccount.name }}
{{- $claimName := default (printf "%s-state" $name) .Values.aiops.persistence.existingClaim }}
{{- $repository := default (printf "%s/%s" .Values.default.image.repository $name) .Values.aiops.image.repository }}
{{- $tag := default (default .Chart.AppVersion .Values.default.image.tag) .Values.aiops.image.tag }}
{{- if .Values.aiops.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $serviceAccountName }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: aiops
  {{- with .Values.aiops.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
---
{{- end }}
{{- if and .Values.aiops.persistence.enabled (not .Values.aiops.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $claimName }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - {{ .Values.aiops.persistence.accessMode }}
  {{- with .Values.aiops.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.aiops.persistence.size }}
---
{{- end }}
{{- if .Values.aiops.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-reader
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-reader
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-reader
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: aiops
spec:
  replicas: {{ .Values.aiops.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: aiops
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.aiops.service.port | quote }}
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $name }}
          image: {{ printf "%s:%s" $repository $tag | quote }}
          imagePullPolicy: {{ .Values.aiops.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.aiops.service.port }}
              protocol: TCP
          env:
            - name: AIOPS_ENVIRONMENT
              value: {{ .Values.aiops.config.environment | quote }}
            - name: AIOPS_POLICY_MODE
              value: {{ .Values.aiops.config.policyMode | quote }}
            - name: AIOPS_AUTO_RUN_ENABLED
              value: {{ .Values.aiops.config.autoRunEnabled | quote }}
            - name: AIOPS_AUTO_RUN_INTERVAL_SECONDS
              value: {{ .Values.aiops.config.autoRunIntervalSeconds | quote }}
            - name: AIOPS_PROMETHEUS_BASE_URL
              value: {{ .Values.aiops.config.prometheusBaseUrl | quote }}
            - name: AIOPS_STATE_STORE_PATH
              value: /app/state/aiops.sqlite3
            - name: AIOPS_REMEDIATION_AUDIT_PATH
              value: /app/state/remediation_audit.jsonl
            - name: AIOPS_RCA_HISTORY_PATH
              value: /app/state/rca_history.jsonl
            - name: AIOPS_KUBERNETES_API_URL
              value: https://kubernetes.default.svc
            - name: AIOPS_KUBERNETES_BEARER_TOKEN_FILE
              value: /var/run/secrets/kubernetes.io/serviceaccount/token
            - name: AIOPS_KUBERNETES_CA_CERT_PATH
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          {{- with .Values.aiops.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ . }}
          {{- end }}
          resources:
            {{- toYaml .Values.aiops.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: state
              mountPath: /app/state
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: state
          {{- if .Values.aiops.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $claimName }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: aiops
  {{- with .Values.aiops.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.aiops.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
