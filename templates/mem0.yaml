{{- if .Values.mem0.enabled }}
{{- $mem0 := .Values.mem0 }}
{{- $_ := required "mem0.image.repository is required when Mem0 is enabled" $mem0.image.repository }}
{{- $_ := required "mem0.image.tag is required when Mem0 is enabled" $mem0.image.tag }}
{{- $_ := required "mem0.rds.host is required when Mem0 is enabled" $mem0.rds.host }}
{{- $_ := required "mem0.rds.masterSecretArn is required when Mem0 is enabled" $mem0.rds.masterSecretArn }}
{{- $_ := required "mem0.runtimeSecretArn is required when Mem0 is enabled" $mem0.runtimeSecretArn }}
{{- $_ := required "mem0.serviceAccount.roleArn is required when Mem0 is enabled" $mem0.serviceAccount.roleArn }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $mem0.serviceAccount.name }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: {{ $mem0.serviceAccount.roleArn | quote }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $mem0.masterSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ $mem0.masterSecretName }}
    creationPolicy: Orphan
    template:
      engineVersion: v2
      data:
        MEM0_RDS_MASTER_USERNAME: {{ `{{ .username }}` | quote }}
        MEM0_RDS_MASTER_PASSWORD: {{ `{{ .password }}` | quote }}
        MEM0_RDS_MASTER_HOST: {{ `{{ .host }}` | quote }}
        MEM0_RDS_MASTER_PORT: {{ `{{ .port }}` | quote }}
  dataFrom:
    - extract:
        key: {{ $mem0.rds.masterSecretArn | quote }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $mem0.runtimeSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ $mem0.runtimeSecretName }}
    creationPolicy: Orphan
    template:
      engineVersion: v2
  dataFrom:
    - extract:
        key: {{ $mem0.runtimeSecretArn | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mem0-migrate
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        opentelemetry.io/name: mem0-migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ $mem0.serviceAccount.name }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ printf "%s:%s" $mem0.image.repository $mem0.image.tag | quote }}
          command: ["sh", "-ec", "python server/scripts/bootstrap_rds_iam.py && alembic upgrade head"]
          env:
            - name: POSTGRES_HOST
              value: {{ $mem0.rds.host | quote }}
            - name: POSTGRES_PORT
              value: {{ $mem0.rds.port | quote }}
            - name: POSTGRES_DB
              value: {{ $mem0.rds.database | quote }}
            - name: POSTGRES_USER
              value: mem0_app
            - name: POSTGRES_SSLMODE
              value: require
            - name: MEM0_RDS_IAM_AUTH
              value: "true"
            - name: AWS_REGION
              value: us-east-1
          envFrom:
            - secretRef:
                name: {{ $mem0.masterSecretName }}
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mem0
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels: { opentelemetry.io/name: mem0 }
  template:
    metadata:
      labels: { opentelemetry.io/name: mem0 }
    spec:
      serviceAccountName: {{ $mem0.serviceAccount.name }}
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: mem0
          image: {{ printf "%s:%s" $mem0.image.repository $mem0.image.tag | quote }}
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports: [{ name: http, containerPort: 8000 }]
          env:
            - name: POSTGRES_HOST
              value: {{ $mem0.rds.host | quote }}
            - name: POSTGRES_PORT
              value: {{ $mem0.rds.port | quote }}
            - name: POSTGRES_DB
              value: {{ $mem0.rds.database | quote }}
            - name: POSTGRES_USER
              value: mem0_app
            - name: POSTGRES_SSLMODE
              value: require
            - name: MEM0_RDS_IAM_AUTH
              value: "true"
            - name: AWS_REGION
              value: us-east-1
          envFrom:
            - secretRef:
                name: {{ $mem0.runtimeSecretName }}
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet: { path: /health/live, port: http }
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
          volumeMounts:
            - name: history
              mountPath: /app/history
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: history
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mem0
spec:
  selector: { opentelemetry.io/name: mem0 }
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mem0-cleanup
spec:
  schedule: {{ $mem0.cleanupSchedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ $mem0.serviceAccount.name }}
          containers:
            - name: cleanup
              image: {{ printf "%s:%s" $mem0.image.repository $mem0.image.tag | quote }}
              command: ["python", "server/scripts/cleanup_expired_memories.py"]
              env:
                - { name: POSTGRES_HOST, value: {{ $mem0.rds.host | quote }} }
                - { name: POSTGRES_PORT, value: {{ $mem0.rds.port | quote }} }
                - { name: POSTGRES_DB, value: {{ $mem0.rds.database | quote }} }
                - { name: POSTGRES_USER, value: mem0_app }
                - { name: POSTGRES_SSLMODE, value: require }
                - { name: MEM0_RDS_IAM_AUTH, value: "true" }
                - { name: AWS_REGION, value: us-east-1 }
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits: { cpu: 500m, memory: 512Mi }
{{- end }}
