{{- if .Values.externalSecrets.enabled }}
---
# ──────────────────────────────────────────────────────────────────
# ClusterSecretStore: kết nối ESO với AWS Secrets Manager
# Dùng IRSA (IAM Role được annotate trên ServiceAccount của ESO)
# để xác thực với AWS - không cần hardcode AWS credentials
# ──────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# ──────────────────────────────────────────────────────────────────
# ExternalSecret: postgres-credentials
# Sync từ AWS Secrets Manager → K8s Secret "postgres-credentials"
# Dùng bởi: postgresql (POSTGRES_USER, POSTGRES_PASSWORD)
# ──────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: postgres-user
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/postgres-credentials
        property: postgres-user
    - secretKey: postgres-password
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/postgres-credentials
        property: postgres-password
---
# ──────────────────────────────────────────────────────────────────
# ExternalSecret: app-db-credentials
# Sync từ AWS Secrets Manager → K8s Secret "app-db-credentials"
# Dùng bởi: accounting, product-catalog, product-reviews
# (DB_CONNECTION_STRING chứa password otelu/otelp)
# ──────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/app-db-credentials
        property: db-password
    - secretKey: accounting-connection-string
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/app-db-credentials
        property: accounting-connection-string
    - secretKey: product-catalog-connection-string
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/app-db-credentials
        property: product-catalog-connection-string
    - secretKey: product-reviews-connection-string
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/app-db-credentials
        property: product-reviews-connection-string
---
# ──────────────────────────────────────────────────────────────────
# ExternalSecret: grafana-admin
# Sync từ AWS Secrets Manager → K8s Secret "grafana-admin"
# Dùng bởi: grafana subchart (admin.existingSecret)
# ──────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/grafana-admin
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/grafana-admin
        property: admin-password
---
# ──────────────────────────────────────────────────────────────────
# ExternalSecret: flagd-ui-secret
# Sync từ AWS Secrets Manager → K8s Secret "flagd-ui-secret"
# Dùng bởi: flagd sidecar (SECRET_KEY_BASE cho Phoenix app)
# ──────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flagd-ui-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: flagd-ui-secret
    creationPolicy: Owner
  data:
    - secretKey: secret-key-base
      remoteRef:
        key: {{ .Values.externalSecrets.secretPrefix }}/flagd-ui-secret
        property: secret-key-base
{{- end }}
