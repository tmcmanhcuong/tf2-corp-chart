{{/* ── 7. CART ──────────────────────────────────────────────────────── */}}
{{- if .Values.components.cart.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cart
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      opentelemetry.io/name: cart
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: opentelemetry.io/name
                operator: In
                values: [frontend, checkout]
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # In-cluster singleton (dev) and/or managed ElastiCache (prod private DNS).
    # When NetworkPolicy is enforced, cart must reach either the valkey-cart pod
    # or VPC-private ElastiCache on 6379 (TLS+AUTH is app-level).
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: valkey-cart
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: flagd
      ports:
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 8016
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
{{- end }}

