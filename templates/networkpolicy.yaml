{{/* ── 4. FRONTEND-PROXY ────────────────────────────────────────────── */}}
{{- if (index .Values.components "frontend-proxy").enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-proxy
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      opentelemetry.io/name: frontend-proxy
  policyTypes:
    - Ingress
{{- if $enforceEgress }}
    - Egress
{{- end }}
  ingress:
    - from:
        {{- range .Values.networkPolicy.albIngressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: load-generator-worker
        - podSelector:
            matchLabels:
              opentelemetry.io/name: load-generator
      ports:
        - protocol: TCP
          port: 8080
{{- if $enforceEgress }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: frontend
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jaeger
      ports:
        - protocol: TCP
          port: 16686
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: image-provider
      ports:
        - protocol: TCP
          port: 8081
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: load-generator
      ports:
        - protocol: TCP
          port: 8089
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: flagd
      ports:
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 4000  # flagd-ui sidecar
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Argo CD UI (control plane in argocd NS; path /argocd on frontend-proxy)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 8080
{{- end }}
{{- end }}

