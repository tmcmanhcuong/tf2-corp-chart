        - { protocol: TCP, port: 10250 }
{{- if $enforceEgress }}
  egress:
    - to:
        - ipBlock:
            cidr: {{ $kubernetesApiCidr }}
      ports:
        - { protocol: TCP, port: 443 }
    - to:
        - ipBlock:
            cidr: {{ $vpcCidr }}
      ports:
        - { protocol: TCP, port: 10250 }
{{- end }}
{{- end }}

