spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  policyTypes:
    - Ingress
{{- if $enforceEgress }}
    - Egress
{{- end }}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: 4317
    - from:
        {{- range .Values.networkPolicy.albIngressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
        - podSelector:
            matchExpressions:
              - key: opentelemetry.io/name
                operator: In
                values: [frontend-proxy]
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 16686
{{- if $enforceEgress }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
{{- end }}
{{- end }}

{{/* ── 29. GRAFANA ──────────────────────────────────────────────────── */}}
{{- if index .Values "grafana" "enabled" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
{{- if $enforceEgress }}
    - Egress
{{- end }}
  ingress:
    - from:
        {{- range .Values.networkPolicy.albIngressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
        - podSelector:
            matchLabels:
              opentelemetry.io/name: frontend-proxy
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
{{- if $enforceEgress }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jaeger
      ports:
        - protocol: TCP
          port: 16686
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: opensearch
      ports:
        - protocol: TCP
          port: 9200
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: egress-proxy
      ports:
        - protocol: TCP
          port: {{ .Values.egressProxy.port }}
    # Provisioning init/sidecars list namespaced ConfigMaps and Secrets.
    - to:
        - ipBlock:
            cidr: {{ $kubernetesApiCidr }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- end }}

{{/* ── 30. EGRESS PROXY ────────────────────────────────────────────── */}}
{{- if and $enforceEgress .Values.egressProxy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-proxy
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: egress-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: opentelemetry.io/name
                operator: In
                values:
                  {{- range .Values.egressProxy.callers }}
                  - {{ . }}
                  {{- end }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: {{ .Values.egressProxy.port }}

    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.egressProxy.adminPort }}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}

{{- end }}{{/* end networkPolicy.enabled */}}

