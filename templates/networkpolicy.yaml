{{/* ── 27. PROMETHEUS ───────────────────────────────────────────────── */}}
{{- if index .Values "prometheus" "enabled" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [grafana, jaeger, prometheus-adapter]
      ports:
        - protocol: TCP
          port: 9090
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Prometheus scrapes pods across the namespace
    - to:
        - podSelector: {}
    # Scrape kubelet metrics from nodes
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 443
{{- end }}

