{{/*
NetworkPolicy: SEC-05 east-west traffic restriction.
Default-deny all ingress, then explicit per-service allow-rules.
Docs: docs/operations/network-policy.md
*/}}
{{- if .Values.networkPolicy.enabled }}
{{- $relCtx := . }}
{{- $ns := .Release.Namespace }}

{{/* ── 1. DEFAULT DENY ─────────────────────────────────────────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

{{/* ── 2. ALLOW DNS (all pods need kube-dns egress) ────────────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

{{/* ── 3. OTEL-COLLECTOR: accept telemetry from all pods ──────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-otel-collector
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: otel-collector
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 9092  # kafkametrics scrape

{{/* ── 4. FRONTEND-PROXY ────────────────────────────────────────────── */}}
{{- if (index .Values.components "frontend-proxy").enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-proxy
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      opentelemetry.io/name: frontend-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}  # public ALB target — allow all ingress
  egress:
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: frontend
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: grafana
      ports:
        - protocol: TCP
          port: 80
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: jaeger
      ports:
        - protocol: TCP
          port: 16686
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: image-provider
      ports:
        - protocol: TCP
          port: 8081
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: load-generator
      ports:
        - protocol: TCP
          port: 8089
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: flagd
      ports:
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 4000  # flagd-ui sidecar
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Argo CD UI (control plane in argocd NS; path /argocd on frontend-proxy)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 80
{{- end }}

