{{/*
NetworkPolicy: SEC-05 east-west traffic restriction.
Default-deny all ingress, then explicit per-service allow-rules.
Docs: docs/operations/network-policy.md
*/}}
{{- if .Values.networkPolicy.enabled }}
{{- $relCtx := . }}
{{- $enforceEgress := .Values.networkPolicy.enforceEgress }}
{{- $vpcCidr := .Values.networkPolicy.vpcCidr }}
{{- $kubernetesApiCidr := .Values.networkPolicy.kubernetesApiCidr }}
{{- $ns := .Release.Namespace }}
{{- if and $enforceEgress (not .Values.egressProxy.enabled) }}
{{- fail "networkPolicy.enforceEgress=true requires egressProxy.enabled=true" }}
{{- end }}

{{/* ── 1. DEFAULT DENY ─────────────────────────────────────────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
{{- if $enforceEgress }}
    - Egress
{{- end }}

{{/* ── 2. ALLOW DNS (only when egress isolation is enabled) ──────────── */}}
{{- if $enforceEgress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

{{- end }}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd-mesh
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound mTLS traffic from other meshed pods in the namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4143
    # Allow control plane and kubelet to scrape metrics / perform readiness probes
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - linkerd
                  - kube-system
                  - techx-corp-prod
      ports:
        - protocol: TCP
          port: 4191
  egress:
    # Allow outbound mTLS traffic to other meshed pods in the namespace
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4143
    # Allow egress to Linkerd control plane services in the linkerd namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
      ports:
        - protocol: TCP
          port: 8080  # identity
        - protocol: TCP
          port: 8086  # destination
        - protocol: TCP
          port: 8090  # policy


{{/* ── 3. OTEL-COLLECTOR: accept telemetry from all pods ──────────── */}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-otel-collector
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: otel-collector
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: techx-corp
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 9092  # kafkametrics scrape

{{/* Observability/control-plane pods are selected by the namespace-wide deny. */}}
{{- if and $enforceEgress (index .Values "opentelemetry-collector" "enabled") }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector-egress
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: otel-collector
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jaeger
      ports:
        - { protocol: TCP, port: 4317 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - { protocol: TCP, port: 9090 }
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: opensearch
      ports:
        - { protocol: TCP, port: 9200 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - { protocol: TCP, port: 4318 }
    # Kubernetes attributes and cluster metrics use the in-cluster API Service.
    - to:
        - ipBlock:
            cidr: {{ $kubernetesApiCidr }}
      ports:
        - { protocol: TCP, port: 443 }
    # Kubelet metrics use node IPs inside the production VPC.
    - to:
        - ipBlock:
            cidr: {{ $vpcCidr }}
      ports:
        - { protocol: TCP, port: 10250 }
        - { protocol: TCP, port: 9096 } # Amazon MSK SASL/SCRAM
{{- end }}

{{- if (index .Values "metrics-server" "enabled") }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
