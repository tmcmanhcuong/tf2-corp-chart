    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
{{- if $enforceEgress }}
    - Egress
{{- end }}
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [grafana, jaeger, prometheus-adapter]
      ports:
        - protocol: TCP
          port: 9090
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: 9090
{{- if $enforceEgress }}
  egress:
    # Prometheus may scrape only chart-managed workload endpoints.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: techx-corp
      ports:
        - { protocol: TCP, port: 3551 }
        - { protocol: TCP, port: 3552 }
        - { protocol: TCP, port: 8000 }
        - { protocol: TCP, port: 8013 }
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 8081 }
        - { protocol: TCP, port: 8888 }
        - { protocol: TCP, port: 9090 }
        - { protocol: TCP, port: 9464 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kube-state-metrics
      ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 8081 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - { protocol: TCP, port: 8888 }
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: karpenter
      ports:
        - { protocol: TCP, port: 8080 }
    # Kubernetes discovery uses the in-cluster API Service.
    - to:
        - ipBlock:
            cidr: {{ $kubernetesApiCidr }}
      ports:
        - protocol: TCP
          port: 443
    # Kubelet scrape stays inside the production VPC.
    - to:
        - ipBlock:
            cidr: {{ $vpcCidr }}
      ports:
        - protocol: TCP
          port: 10250
{{- end }}
{{- end }}

