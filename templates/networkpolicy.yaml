{{/* ── 24. LOAD-GENERATOR (Locust master) ────────────────────────────── */}}
{{- if (index .Values.components "load-generator").enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: load-generator
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      opentelemetry.io/name: load-generator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Locust web UI via frontend-proxy
    - from:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: frontend-proxy
      ports:
        - protocol: TCP
          port: 8089
    # Distributed Locust: workers register/heartbeat on master bind port
    - from:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: load-generator-worker
      ports:
        - protocol: TCP
          port: 5557
  egress:
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: frontend-proxy
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: flagd
      ports:
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 8016
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
{{- end }}

{{/* ── 24b. LOAD-GENERATOR-WORKER (Locust workers) ───────────────────── */}}
{{- if (index .Values.components "load-generator-worker").enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: load-generator-worker
  labels:
    {{- include "techx-corp.labels" $relCtx | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      opentelemetry.io/name: load-generator-worker
  policyTypes:
    - Ingress
    - Egress
  # Workers do not serve inbound traffic; deny ingress by default (empty rules).
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: load-generator
      ports:
        - protocol: TCP
          port: 5557
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: frontend-proxy
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              opentelemetry.io/name: flagd
      ports:
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 8016
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
{{- end }}

