{{- $frontendProxy := index .Values.components "frontend-proxy" }}
{{- if and $frontendProxy $frontendProxy.enabled $frontendProxy.publicAlb $frontendProxy.publicAlb.enabled }}
{{- /* blockSensitivePaths defaults to false: path blocking is at CloudFront edge.
     Set true only for emergency ALB fixed-response without CloudFront. */ -}}
{{- $blockPaths := false -}}
{{- if hasKey $frontendProxy.publicAlb "blockSensitivePaths" -}}
  {{- $blockPaths = $frontendProxy.publicAlb.blockSensitivePaths -}}
{{- end -}}
{{- $scheme := dig "scheme" "internal" $frontendProxy.publicAlb -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-proxy-public
  labels:
    {{- $ctx := dict "Release" .Release "Chart" .Chart "Capabilities" .Capabilities "Template" .Template "name" "frontend-proxy" }}
    {{- include "techx-corp.labels" $ctx | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ $scheme | quote }}
    alb.ingress.kubernetes.io/target-type: {{ $frontendProxy.publicAlb.targetType | quote }}
    alb.ingress.kubernetes.io/listen-ports: {{ $frontendProxy.publicAlb.listenPorts | quote }}
    {{- if $blockPaths }}
    # Optional emergency fixed 403 (prefer CloudFront Function path blocking)
    alb.ingress.kubernetes.io/actions.block-public-path: '{"type":"fixed-response","fixedResponseConfig":{"contentType":"text/plain","statusCode":"403","messageBody":"Access Denied"}}'
    {{- end }}
spec:
  ingressClassName: {{ $frontendProxy.publicAlb.ingressClassName | quote }}
  rules:
    - {{ if $frontendProxy.publicAlb.host }}host: {{ $frontendProxy.publicAlb.host | quote }}
      {{ end }}http:
        paths:
          {{- /* Blocked rules MUST come before catch-all / for ALB path matching order */ -}}
          {{- if $blockPaths }}
          {{- range ($frontendProxy.publicAlb.blockedPrefixes | default list) }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: block-public-path
                port:
                  name: use-annotation
          {{- end }}
          {{- end }}
          # All paths → frontend-proxy (admin/telemetry blocked at CloudFront when enabled)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-proxy
                port:
                  number: {{ dig "service" "port" 8080 $frontendProxy }}
{{- end }}
