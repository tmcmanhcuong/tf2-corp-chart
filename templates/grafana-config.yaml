{{- if .Values.grafana.enabled -}}
{{- /*
  Alerting provisioning — mỗi file alerting được mount thành 1 ConfigMap riêng.
  Sidecar sc-alerts (label grafana_alert: "1") sẽ watch tất cả ConfigMap có label này
  và copy vào /etc/grafana/provisioning/alerting/ trong Grafana pod.

  Glob cả *.yaml để bắt tất cả file provisioning alerting.
*/ -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
    grafana_alert: "1"
data:
  {{- (.Files.Glob "grafana/provisioning/alerting/*.yaml").AsConfig | nindent 2 }}

{{ if .Values.aiops.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-aiops-alert-routing
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
    grafana_alert: "1"
data:
  aiops-alert-routing.yaml: |-
{{ .Files.Get "grafana/aiops/alert-routing.yaml" | indent 4 }}
{{- end }}

{{- range $path, $_ := .Files.Glob "grafana/provisioning/dashboards/*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-{{ $name | lower }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" $ | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{ $name }}.json: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
    grafana_datasource: "1"
data:
  {{- (.Files.Glob "grafana/provisioning/datasources/*.yaml").AsConfig | nindent 2 }}

{{- end }}
