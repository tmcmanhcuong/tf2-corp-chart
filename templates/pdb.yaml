{{- range $name, $config := .Values.components }}
    {{- if not (hasKey . "componentServiceAccount") }}
    {{-   $_ := set . "componentServiceAccount" .serviceAccount }}
    {{- end }}
    {{- $config := set . "Capabilities" $.Capabilities }}
    {{- $config := set . "Template" $.Template }}
    {{- $config := set . "name" ($name | lower) }}
    {{- $config := set . "Release" $.Release }}
    {{- $config := set . "Chart" $.Chart }}
    {{- $config := set . "serviceAccount" $.Values.serviceAccount }}
    {{- $config := set . "observability" $.Values.observability }}
    {{- $config := set . "defaultValues" $.Values.default }}

    {{- $fixedReplicas := int ($config.replicas | default $.Values.default.replicas) -}}
    {{- $autoscalingMinReplicas := 0 -}}
    {{- if and $config.autoscaling $config.autoscaling.enabled -}}
        {{- $autoscalingMinReplicas = int ($config.autoscaling.minReplicas | default 1) -}}
    {{- end -}}

    {{- /* Protect both HPA-backed and fixed-size multi-replica Deployments. */ -}}
    {{- if and $config.enabled (not $config.stateful) (or (ge $fixedReplicas 2) (ge $autoscalingMinReplicas 2)) -}}
        {{- include "techx-corp.pdb" $config -}}
    {{- end }}
{{- end }}
