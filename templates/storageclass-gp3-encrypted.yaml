{{- /*
  Encrypted gp3 StorageClass for EBS CSI dynamic provisioning.
  parameters.encrypted forces at-rest encryption (alias/aws/ebs when account default KMS is used).
*/ -}}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-encrypted
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/part-of: techx-corp
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
# Change trail: @hungxqt - 2026-07-22 - Add encrypted gp3 StorageClass for EBS CSI PVCs.
