apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: policy-controller-admin
rules:
  - apiGroups: [""]
    resources: ["configmaps", "namespaces", "secrets", "services", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["policy.sigstore.dev"]
    resources: ["clusterimagepolicies", "clusterimagepolicies/status", "trustroots", "trustroots/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: policy-controller-admin-binding
subjects:
  - kind: ServiceAccount
    name: policy-controller
    namespace: cosign-system
roleRef:
  kind: ClusterRole
  name: policy-controller-admin
  apiGroup: rbac.authorization.k8s.io
