# AppProject for development cluster Application "techx-corp".
# Inventory (helm template + deps): ClusterRole / ClusterRoleBinding from Grafana,
# OpenTelemetry Collector, Prometheus. First-party chart resources are namespaced.
# Re-run inventory after subchart upgrades.
#
# Apply once: kubectl apply -f gitops/clusters/dev/
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: techx-corp-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: TechX Corp application workloads (development)

  # Only this Git repo may be used as source.
  sourceRepos:
    # Actual GitHub repo name is tf2-corp-chart (local folder may still be techx-corp-chart).
    - https://github.com/tmcmanhcuong/tf2-corp-chart.git
    - https://github.com/tmcmanhcuong/tf2-corp-chart.git/*
    # Allow SSH form if operators use deploy keys:
    - git@github.com:tmcmanhcuong/tf2-corp-chart.git
    - git@github.com:tmcmanhcuong/tf2-corp-chart.git/*

  destinations:
    # Primary app namespace (must match Application.spec.destination.namespace).
    - server: https://kubernetes.default.svc
      namespace: techx-corp-dev
    # metrics-server subchart installs RoleBinding metrics-server-auth-reader here.
    - server: https://kubernetes.default.svc
      namespace: kube-system

  # Explicit cluster-scoped allow-list (from chart inventory). No wildcards.
  # Includes metrics-server APIService + RBAC ClusterRole(s) from Grafana/OTel/Prometheus.
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiregistration.k8s.io
      kind: APIService
    - group: ""
      kind: Namespace

  # Do not allow this project to manage Argo CD itself.
  namespaceResourceBlacklist: []

  # Warn on unexpected objects in destination NS. Ignore known non-chart owners:
  # - kube defaults, Helm release Secrets (pre-GitOps), ESO secrets + CRs (secrets-chart),
  # - StatefulSet PVCs (volumeClaimTemplates, not standalone chart objects).
  orphanedResources:
    warn: true
    ignore:
      - kind: ConfigMap
        name: kube-root-ca.crt
      - kind: ServiceAccount
        name: default
      - kind: Secret
        name: sh.helm.release*
      - kind: Secret
        name: techx-corp-*
      - group: external-secrets.io
        kind: ExternalSecret
        name: techx-corp-*
      - kind: PersistentVolumeClaim
        name: kafka-data-kafka-0
      - kind: PersistentVolumeClaim
        name: postgresql-data-postgresql-0
      - kind: PersistentVolumeClaim
        name: valkey-cart-data-valkey-cart-0
      # AWS Load Balancer Controller creates these for ALB Ingress (not in chart).
      - group: elbv2.k8s.aws
        kind: TargetGroupBinding
