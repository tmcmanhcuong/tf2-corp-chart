# AppProject for development cluster Application "techx-corp".
# Inventory (helm template + deps): ClusterRole / ClusterRoleBinding from Grafana,
# OpenTelemetry Collector, Prometheus. First-party chart resources are namespaced.
# Re-run inventory after subchart upgrades.
#
# Apply once: kubectl apply -f gitops/clusters/dev/
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: techx-corp-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: TechX Corp application workloads (development)

  # Only this Git repo may be used as source.
  sourceRepos:
    # Actual GitHub repo name is tf2-corp-chart (local folder may still be techx-corp-chart).
    - https://github.com/tmcmanhcuong/tf2-corp-chart.git
    - https://github.com/tmcmanhcuong/tf2-corp-chart.git/*
    # Allow SSH form if operators use deploy keys:
    - git@github.com:tmcmanhcuong/tf2-corp-chart.git
    - git@github.com:tmcmanhcuong/tf2-corp-chart.git/*

  destinations:
    # Application destination only. CreateNamespace syncOption creates NS via whitelist.
    # Must match Application.spec.destination.namespace (techx-corp-dev).
    - server: https://kubernetes.default.svc
      namespace: techx-corp-dev

  # Explicit cluster-scoped allow-list (from chart inventory). No wildcards.
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: ""
      kind: Namespace

  # Do not allow this project to manage Argo CD itself.
  namespaceResourceBlacklist: []

  orphanedResources:
    warn: true
