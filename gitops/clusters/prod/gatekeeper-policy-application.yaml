# Gatekeeper policy Application (production) — ConstraintTemplates + Constraints.
# Managed by root-prod. MANUAL SYNC until SEC-07 dry-run cutover:
#   1. Controller Application gatekeeper is Healthy.
#   2. Temporary dryrun policy applied; two audit cycles with totalViolations=0.
#   3. Enable automated below (selfHeal true, prune false) via Git PR, then sync.
# Committed constraint enforcementAction remains deny (final source of truth).
#
# Ordering (inside this Application):
#   wave 0 — ConstraintTemplates (create dynamic constraint CRDs via Gatekeeper)
#   wave 1 — Constraints with SkipDryRunOnMissingResource (CRDs appear async)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-policy
  namespace: argocd
spec:
  project: gatekeeper
  source:
    repoURL: https://github.com/tf2-team/tf2-corp-chart.git
    targetRevision: main
    path: gitops/gatekeeper
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  # Manual sync only until cutover. After approval, restore:
  #   automated:
  #     prune: false
  #     selfHeal: true
  syncPolicy:
    syncOptions:
      # App-level: dry-run would fail on Constraints before template CRDs exist.
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
# Change trail: @hungxqt - 2026-07-16 - Skip dry-run for async Gatekeeper constraint CRDs.
