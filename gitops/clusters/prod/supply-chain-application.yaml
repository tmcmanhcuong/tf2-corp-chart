apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supply-chain
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: supply-chain

  sources:
    - repoURL: ghcr.io/sigstore/helm-charts
      chart: policy-controller
      targetRevision: 0.10.5
      helm:
        releaseName: policy-controller
        valuesObject:
          webhook:
            # TLS and CRDs must be healthy before production enforcement is enabled.
            failurePolicy: Ignore
            env:
              COSIGN_REPOSITORY: 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-prod-corp/cosign-artifacts
            podSecurityContext:
              runAsNonRoot: true
            serviceAccount:
              create: true
              name: policy-controller
              annotations:
                eks.amazonaws.com/role-arn: arn:aws:iam::493499579600:role/techx-prod-tf2-policy-controller

    - repoURL: https://github.com/tf2-team/tf2-corp-chart.git
      targetRevision: main
      path: gitops/supply-chain/policy

  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system

  # The policy-controller certificate reconciler owns these CA bundles.
  # Keep all other webhook fields, including failurePolicy and selectors,
  # under normal GitOps drift detection.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: policy.sigstore.dev
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        - .webhooks[]?.namespaceSelector.matchExpressions[]? | select(.key == "webhooks.knative.dev/exclude")
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: policy.sigstore.dev
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        - .webhooks[]?.namespaceSelector.matchExpressions[]? | select(.key == "webhooks.knative.dev/exclude")

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
