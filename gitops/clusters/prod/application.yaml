# Production Application — automated sync + self-heal + prune; NO ServerSideApply.
# Protect ALL prod-affecting paths in GitHub (not only values-prod.yaml):
#   templates/**, charts/**, Chart.yaml, Chart.lock, values.yaml,
#   values-prod.yaml, values-public-alb.yaml, gitops/clusters/prod/**, postgresql/**
#
# Prefer SEC-05 (ESO) before production GitOps cutover for secrets.
# Primary rollback: git revert → merge → Argo auto-syncs.
# History rollback: break-glass only (disable auto-sync first; then update Git).
# prune: true removes live objects no longer in the rendered manifest (e.g. in-cluster
# kafka after MSK cutover). Secrets Application stays prune: false.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp
  namespace: argocd
spec:
  project: techx-corp

  source:
    repoURL: https://github.com/tf2-team/tf2-corp-chart.git
    targetRevision: main
    path: .
    helm:
      valueFiles:
        - values.yaml
        - values-public-alb.yaml
        - values-prod.yaml
        # Selective immutable digests from platform secure-delivery promote.
        - service-digest/values-accounting.yaml
        - service-digest/values-ad.yaml
        - service-digest/values-cart.yaml
        - service-digest/values-checkout.yaml
        - service-digest/values-currency.yaml
        - service-digest/values-email.yaml
        - service-digest/values-flagd-ui.yaml
        - service-digest/values-fraud-detection.yaml
        - service-digest/values-frontend.yaml
        - service-digest/values-frontend-proxy.yaml
        - service-digest/values-image-provider.yaml
        - service-digest/values-kafka.yaml
        - service-digest/values-llm.yaml
        - service-digest/values-load-generator.yaml
        - service-digest/values-mem0.yaml
        - service-digest/values-opensearch.yaml
        - service-digest/values-payment.yaml
        - service-digest/values-product-catalog.yaml
        - service-digest/values-product-reviews.yaml
        - service-digest/values-quote.yaml
        - service-digest/values-recommendation.yaml
        - service-digest/values-shipping.yaml
        - service-digest/values-shopping-copilot.yaml
      releaseName: techx-corp

  destination:
    server: https://kubernetes.default.svc
    namespace: techx-corp-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Do NOT enable ServerSideApply in v1 baseline.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Bound PVCs: the API fills /spec/volumeName after bind; Helm never sets it.
  # After static rebind (encrypted EBS), live volumeName is pv-enc-*; desired is "".
  # Patching volumeName is forbidden on Bound claims and fails the whole sync.
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
# Change trail: @hungxqt - 2026-07-22 - Ignore PVC volumeName so Bound claims do not block Argo sync.
