# Production secrets Application — ExternalSecrets (SEC-05) via secrets-chart.
# Deploy AFTER ESO + ClusterSecretStore Ready; BEFORE or with the main app chart.
# Protect secrets-chart/** and this manifest in GitHub path rules for prod.
#
# releaseName must stay techx-corp-secrets to adopt the existing Helm release.
# Primary rollback: git revert → merge → Argo auto-syncs.
# Break-glass: disable auto-sync first; do not routine helm upgrade after cutover.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp-secrets
  namespace: argocd
spec:
  project: techx-corp

  source:
    repoURL: https://github.com/tf2-team/tf2-corp-chart.git
    targetRevision: main
    path: secrets-chart
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
      releaseName: techx-corp-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: techx-corp-prod

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Do NOT enable ServerSideApply in v1 baseline.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
# Change trail: @hungxqt - 2026-07-15 - Argo Application for production secrets-chart auto-sync.
