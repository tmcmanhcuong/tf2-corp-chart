apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: runtime-hardening
  namespace: argocd
spec:
  project: techx-corp
  source:
    repoURL: https://github.com/tf2-team/tf2-corp-chart.git
    targetRevision: main
    # Phase 3 enforces runtime hardening after audit inventory, CEL review, and
    # production regression gates completed without violations.
    path: gitops/runtime-hardening/overlays/enforce
  destination:
    server: https://kubernetes.default.svc
    namespace: techx-corp-prod
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
