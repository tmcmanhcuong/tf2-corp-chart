apiVersion: v1
kind: Pod
metadata: {name: added-capability, namespace: default}
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: nginx:1.29.0
      securityContext:
        capabilities:
          drop: ["ALL"]
          add: ["NET_ADMIN"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m, memory: 64Mi}
