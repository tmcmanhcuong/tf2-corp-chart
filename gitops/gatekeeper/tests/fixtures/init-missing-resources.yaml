apiVersion: v1
kind: Pod
metadata: {name: init-missing-resources, namespace: default}
spec:
  initContainers:
    - {name: setup, image: "busybox:1.37.0"}
  containers:
    - name: app
      image: nginx:1.29.0
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m, memory: 64Mi}
