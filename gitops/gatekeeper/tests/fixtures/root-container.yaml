apiVersion: v1
kind: Pod
metadata: {name: root-container, namespace: default}
spec:
  containers:
    - name: app
      image: nginx:1.29.0
      securityContext:
        runAsNonRoot: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m, memory: 64Mi}
