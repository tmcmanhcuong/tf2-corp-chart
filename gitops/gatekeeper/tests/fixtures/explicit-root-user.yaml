apiVersion: v1
kind: Pod
metadata: {name: explicit-root-user, namespace: default}
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 0
  containers:
    - name: app
      image: nginx:1.29.0
      securityContext:
        capabilities:
          drop: ["ALL"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m, memory: 64Mi}
