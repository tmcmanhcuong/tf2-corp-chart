apiVersion: v1
kind: Pod
metadata: {name: missing-limit-memory, namespace: default}
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: nginx:1.29.0
      securityContext:
        capabilities:
          drop: ["ALL"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m}
