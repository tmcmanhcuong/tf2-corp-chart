apiVersion: v1
kind: Pod
metadata: {name: insecure-init-container, namespace: default}
spec:
  securityContext:
    runAsNonRoot: true
  initContainers:
    - name: setup
      image: busybox:1.37.0
      securityContext:
        runAsNonRoot: false
  containers:
    - name: app
      image: nginx:1.29.0
      securityContext:
        capabilities:
          drop: ["ALL"]
