apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerHardening
metadata:
  name: container-hardening
  annotations:
    # Wave after ConstraintTemplates; skip dry-run until Gatekeeper generates the CRD.
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  enforcementAction: deny
  match:
    scope: Namespaced
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - gatekeeper-system
    kinds:
      - apiGroups: [""]
        kinds: ["Pod", "ReplicationController"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet", "ReplicaSet"]
      - apiGroups: ["batch"]
        kinds: ["Job", "CronJob"]
# Change trail: @hungxqt - 2026-07-16 - Sync-wave + SkipDryRun for Gatekeeper constraint CRDs.
