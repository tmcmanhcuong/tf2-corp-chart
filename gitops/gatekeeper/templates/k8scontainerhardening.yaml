apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8scontainerhardening
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  crd:
    spec:
      names:
        kind: K8sContainerHardening
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            rego: |
              package k8scontainerhardening

              pod_spec := input.review.object.spec if {
                input.review.kind.kind == "Pod"
              }

              pod_spec := input.review.object.spec.template.spec if {
                input.review.kind.kind in {"Deployment", "StatefulSet", "DaemonSet", "ReplicaSet", "Job", "ReplicationController"}
              }

              pod_spec := input.review.object.spec.jobTemplate.spec.template.spec if {
                input.review.kind.kind == "CronJob"
              }

              checked_containers contains {"container": container, "type": "container"} if {
                some container in object.get(pod_spec, "containers", [])
              }

              checked_containers contains {"container": container, "type": "initContainer"} if {
                some container in object.get(pod_spec, "initContainers", [])
              }

              checked_containers contains {"container": container, "type": "ephemeralContainer"} if {
                some container in object.get(pod_spec, "ephemeralContainers", [])
              }

              effective_run_as_non_root(container) := object.get(container_sc, "runAsNonRoot", object.get(pod_sc, "runAsNonRoot", false)) if {
                container_sc := object.get(container, "securityContext", {})
                pod_sc := object.get(pod_spec, "securityContext", {})
              }

              violation contains {"msg": msg} if {
                some ref in checked_containers
                effective_run_as_non_root(ref.container) != true
                msg := sprintf("%s %s: %s %s must set effective securityContext.runAsNonRoot=true", [input.review.kind.kind, input.review.object.metadata.name, ref.type, ref.container.name])
              }

              violation contains {"msg": msg} if {
                some ref in checked_containers
                container_sc := object.get(ref.container, "securityContext", {})
                capabilities := object.get(container_sc, "capabilities", {})
                drops := object.get(capabilities, "drop", [])
                not "ALL" in drops
                msg := sprintf("%s %s: %s %s must include ALL in securityContext.capabilities.drop", [input.review.kind.kind, input.review.object.metadata.name, ref.type, ref.container.name])
              }
