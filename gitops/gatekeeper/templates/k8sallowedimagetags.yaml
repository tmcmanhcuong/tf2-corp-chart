apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sallowedimagetags
  annotations:
    # Apply before Constraints so Gatekeeper can register K8sAllowedImageTags CRD.
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sAllowedImageTags
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            rego: |
              package k8sallowedimagetags

              pod_spec := input.review.object.spec if {
                input.review.kind.kind == "Pod"
              }

              pod_spec := input.review.object.spec.template.spec if {
                input.review.kind.kind in {"Deployment", "StatefulSet", "DaemonSet", "ReplicaSet", "Job", "ReplicationController"}
              }

              pod_spec := input.review.object.spec.jobTemplate.spec.template.spec if {
                input.review.kind.kind == "CronJob"
              }

              checked_containers contains {"container": container, "type": "container"} if {
                some container in object.get(pod_spec, "containers", [])
              }

              checked_containers contains {"container": container, "type": "initContainer"} if {
                some container in object.get(pod_spec, "initContainers", [])
              }

              checked_containers contains {"container": container, "type": "ephemeralContainer"} if {
                some container in object.get(pod_spec, "ephemeralContainers", [])
              }

              valid_digest(image) if {
                regex.match("^.+@sha256:[a-fA-F0-9]{64}$", image)
              }

              valid_fixed_tag(image) if {
                regex.match("^[^@]+:[^/:@]+$", image)
                matches := regex.find_n(":[^/:@]+$", image, 1)
                tag := trim_prefix(matches[0], ":")
                lower(tag) != "latest"
              }

              valid_image(image) if valid_digest(image)
              valid_image(image) if valid_fixed_tag(image)

              violation contains {"msg": msg} if {
                some ref in checked_containers
                image := object.get(ref.container, "image", "")
                not valid_image(image)
                msg := sprintf("%s %s: %s %s uses unpinned image %q; use a fixed tag or sha256 digest", [input.review.kind.kind, input.review.object.metadata.name, ref.type, ref.container.name, image])
              }
