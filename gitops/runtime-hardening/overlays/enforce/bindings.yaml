apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: runtime-hardening-pod-enforce.techx.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  policyName: runtime-hardening-pod.techx.io
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          # Temporary migration exclusion; remove after Gatekeeper retirement.
          values: [kube-system, kube-public, kube-node-lease, gatekeeper-system]
---
