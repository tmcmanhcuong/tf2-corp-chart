apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: runtime-hardening-pod-enforce.techx.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  policyName: runtime-hardening-pod.techx.io
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          # System namespaces and service-mesh infrastructure are excluded.
          # linkerd: proxy-init requires NET_ADMIN for iptables; argocd: GitOps controller.
          values: [techx-corp-prod, linkerd, argocd]
---
apiVersion: admissionregistration.k8s.io/v1
