# Root Application (dev) — app-of-apps entrypoint.
# Sources gitops/clusters/dev so child Application/AppProject CRs are Git-reconciled.
# One-time bootstrap: kubectl apply -f gitops/bootstrap/dev/
# prune OFF: avoid cascade-delete of child Applications when a YAML is removed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dev
  namespace: argocd
spec:
  project: platform-root-dev

  source:
    repoURL: https://github.com/tmcmanhcuong/tf2-corp-chart.git
    targetRevision: techx-dev-corp
    path: gitops/clusters/dev
    directory:
      recurse: false
      include: '{*.yaml,*.yml}'

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      # Do NOT enable ServerSideApply in v1 baseline.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
# Change trail: @hungxqt - 2026-07-16 - Prefix 10 so Application applies after AppProject.
