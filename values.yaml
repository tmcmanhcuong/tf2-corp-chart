# yaml-language-server: $schema=./values.schema.json

# SEC-05: NetworkPolicy — east-west traffic restriction.
# Requires a CNI that enforces NetworkPolicy (e.g. AWS VPC CNI with Network Policy support,
# Calico, Cilium). Verify CNI support before enabling in production.
# Docs: docs/operations/network-policy.md
#
# Roll-out approach (recommended):
#   Phase 1 — audit: deploy with enabled: false, preview blocked flows with CNI audit tool.
#   Phase 2 — enforce: set enabled: true in dev; soak 24h, check OTel traces for errors.
#   Phase 3 — promote: apply to prod after dev soak is clean.
networkPolicy:
  enabled: false
  # Three-state rollout: false/false = disabled, true/false = ingress only,
  # true/true = ingress and egress enforcement.
  enforceEgress: false
  vpcCidr: 10.0.0.0/16
  # ClusterIP of default/kubernetes as a host CIDR. Keep separate from vpcCidr:
  # NetworkPolicy evaluates in-cluster API traffic against this Service IP.
  kubernetesApiCidr: 172.20.0.1/32
  albIngressCidrs:
    - 10.0.0.0/16
  # flagd keeps its existing BTC HTTP provider path and is not proxy-injected.
  flagdSyncCidrs:
    - 122.248.223.194/32

egressProxy:
  enabled: false
  replicas: 2
  image:
    repository: envoyproxy/envoy
    tag: distroless-v1.38.0
    digest: sha256:a7a56545102f7a682e0cafea2c9b8448af1b09ebb710eab688dfb931e3ec7ff6
    pullPolicy: IfNotPresent
  port: 10000
  adminPort: 9901
  callers:
    - checkout
    - grafana
    - product-reviews
    - shopping-copilot
  noProxy: ".svc,.svc.cluster.local,localhost,127.0.0.1,10.0.0.0/8,accounting,ad,cart,checkout,currency,email,flagd,fraud-detection,frontend,frontend-proxy,image-provider,llm,payment,product-catalog,product-reviews,quote,recommendation,shipping,shopping-copilot,otel-collector,prometheus,jaeger,grafana"
  allowedDomains:
    # Envoy matches the CONNECT target, which includes the destination port.
    - api.groq.com:443
    - bedrock-runtime.us-east-1.amazonaws.com:443
    - sts.us-east-1.amazonaws.com:443
    # Grafana CloudWatch datasource uses the regional metrics and logs APIs.
    - monitoring.us-east-1.amazonaws.com:443
    - logs.us-east-1.amazonaws.com:443
    - dynamodb.us-east-1.amazonaws.com:443
    - 493499579600.ddb.us-east-1.amazonaws.com:443
    - "*.ddb.us-east-1.amazonaws.com:443"
    - s3.us-east-1.amazonaws.com:443
    - "*.s3.us-east-1.amazonaws.com:443"
    # Grafana CUR datasource uses Athena, Glue, STS and S3 in ap-southeast-1.
    - athena.ap-southeast-1.amazonaws.com:443
    - glue.ap-southeast-1.amazonaws.com:443
    - sts.ap-southeast-1.amazonaws.com:443
    - s3.ap-southeast-1.amazonaws.com:443
    - "*.s3.ap-southeast-1.amazonaws.com:443"
    # Grafana alert contact point. The webhook path/token stays encrypted inside CONNECT.
    - discord.com:443
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

#
# SEC-05: Sensitive credentials use secretKeyRef → ESO-synced Secrets.
# Deploy order: ESO + ClusterSecretStore → techx-corp-secrets → wait Ready → techx-corp.
# Local demo with plaintext: -f values-demo.yaml (never for production).
# Docs: docs/operations/external-secrets.md

externalSecrets:
  enabled: true
  secretStoreName: aws-secretsmanager
  # Default matches production release namespace; override in values-dev.yaml for dev.
  namespace: techx-corp-prod

# Mandate 05 runtime-security inventory.
# This is a scheduled drift detector for already-existing workload specs. It is
# disabled by default and enabled only in production after VAP enforce is live.
runtimeHardeningInventory:
  enabled: false
  clusterName: techx-tf2-prod
  environment: production
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  activeDeadlineSeconds: 120
  backoffLimit: 0
  serviceAccountName: runtime-hardening-inventory
  image:
    repository: public.ecr.aws/docker/library/python
    tag: "3.13.5-alpine3.22"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  # Exact system exception profiles approved in SEC-07 evidence. These are
  # field-level exceptions, not namespace exclusions.
  exceptionProfiles:
    - rootKey: kube-system/DaemonSet/aws-node
      containers:
        - aws-node
        - aws-eks-nodeagent
        - aws-vpc-cni-init
        - "<pod-spec>"
      rules:
        - ADDED_CAPS
        - DROP_ALL
        - NON_ROOT
        - PRIV_ESC
        - PRIVILEGED
        - HOST_NETWORK
        - HOST_PATH
    - rootKey: kube-system/DaemonSet/kube-proxy
      containers:
        - kube-proxy
        - "<pod-spec>"
      rules:
        - DROP_ALL
        - NON_ROOT
        - PRIV_ESC
        - PRIVILEGED
        - HOST_NETWORK
        - HOST_PATH
    - rootKey: kube-system/DaemonSet/ebs-csi-node
      containers:
        - ebs-plugin
        - node-driver-registrar
        - liveness-probe
        - "<pod-spec>"
      rules:
        - DROP_ALL
        - NON_ROOT
        - UID_0
        - PRIV_ESC
        - PRIVILEGED
        - HOST_NETWORK
        - HOST_PATH
    - rootKey: kube-system/DaemonSet/ebs-csi-node-windows
      containers:
        - ebs-plugin
        - node-driver-registrar
        - liveness-probe
        - "<pod-spec>"
      rules:
        - DROP_ALL
        - NON_ROOT
        - PRIV_ESC
        - HOST_NETWORK
        - HOST_PATH
    - rootKey: linkerd-cni/DaemonSet/linkerd-cni
      containers:
        - install-cni
        - "<pod-spec>"
      rules:
        - DROP_ALL
        - NON_ROOT
        - PRIV_ESC
        - HOST_PATH
    # The upstream Linkerd 30.12.2 chart hardens repair-controller but does not
    # expose an explicit runAsNonRoot/runAsUser value. Keep this exception to
    # the single observed tuple; all other container rules remain enforced.
    - rootKey: linkerd-cni/DaemonSet/linkerd-cni
      containers:
        - repair-controller
      rules:
        - NON_ROOT
    - rootKey: kube-system/Deployment/ebs-csi-controller
      containers:
        - ebs-plugin
        - csi-provisioner
        - csi-attacher
        - csi-snapshotter
        - csi-resizer
        - liveness-probe
      rules:
        - DROP_ALL
    - rootKey: kube-system/Deployment/coredns
      containers:
        - coredns
      rules:
        - ADDED_CAPS
        - NON_ROOT

default:
  storageClassName: gp3-encrypted
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    minReadySeconds: 10
    progressDeadlineSeconds: 300
  # List of environment variables applied to all components
  env:
    - name: OTEL_SERVICE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: "metadata.labels['app.kubernetes.io/component']"
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector
    - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      value: cumulative
  # Allows overriding and additions to .Values.default.env
  envOverrides: []
  #  - name: OTEL_K8S_NODE_NAME
  #    value: "someConstantValue"
  image:
    # Image format: REGISTRY/PROJECT/SERVICE:VERSION
    #   e.g. 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-corp/ad:sha-a1b2c3d
    # repository = REGISTRY/PROJECT (service name is appended by the chart template)
    #   helm ... --set default.image.repository=<ACCOUNT>.dkr.ecr.<REGION>.amazonaws.com/techx-corp
    #            --set default.image.tag=sha-a1b2c3d
    repository: 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-corp
    # Tag/VERSION only (no service suffix). Service is part of the repository path.
    tag: "1.0"
    pullPolicy: IfNotPresent
    pullSecrets: []
  # Default # of replicas for all components
  replicas: 1
  # default revisionHistoryLimit for all components (number of old ReplicaSets to retain)
  revisionHistoryLimit: 10
  # Default scheduling: hard placement on Karpenter spot-tolerant nodes.
  # nodeSelector is the hard requirement; Spot capacity-type affinity is preference only.
  # NodePool weight (infra) decides Spot vs On-Demand fallback — do not treat affinity as primary/fallback.
  # topologySpreadConstraints are soft balancing only (ScheduleAnyway); labelSelector is template-injected.
  # Critical components override with nodeSelector workload-class=critical (no Karpenter toleration)
  # and topologySpreadConstraints: [] (opt-out — small critical MNG floor).
  # See techx-corp-infra/docs/workload-placement.md and docs/operations/workload-placement.md
  schedulingRules: &scheduling-spot-tolerant
    nodeSelector:
      workload-class: spot-tolerant
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: karpenter.sh/capacity-type
                  operator: In
                  values:
                    - spot
    tolerations:
      - key: workload-class
        operator: Equal
        value: spot-tolerant
        effect: NoSchedule
    # Soft multi-AZ / multi-node balancing within the spot-tolerant pool only.
    # Does not weaken hard nodeSelector or tolerations; ScheduleAnyway never blocks on capacity.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        minDomains: 2
  # Default podSecurityContext for all components
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  # Default securityContext for all components
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # Default initContainerSecurityContext for all components
  initContainerSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # Runtime-hardening baseline for every first-party init container.
  # Components may override individual values under initContainers[].resources.
  initContainerResources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  automountServiceAccountToken: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Mem0 self-hosted with Amazon RDS IAM database authentication.
# Keep disabled in base values. An environment overlay must supply the RDS
# endpoint, IRSA role, and FastEmbed modelDelivery.s3Prefix (+ archiveName).
# Image follows the global release contract (default.image.repository/mem0:default.image.tag)
# so platform chart promote keeps Mem0 in lockstep with the other 21 services.
# Optional mem0.image.repository / mem0.image.tag are break-glass overrides only.
# Runtime and RDS-master Kubernetes Secrets are synced by secrets-chart (SEC-05).
mem0:
  enabled: false
  awsRegion: us-east-1
  replicas: 1
  image:
    # Empty → {{ default.image.repository }}/mem0:{{ default.image.tag }}
    repository: ""
    tag: ""
  rds:
    host: ""
    port: 5432
    database: mem0
    # IAM database user created by the migrate Job bootstrap script.
    appUser: mem0_app
  serviceAccount:
    name: mem0
    roleArn: ""
  # Secret names only — ExternalSecrets live in secrets-chart.
  runtimeSecretName: techx-corp-mem0
  masterSecretName: techx-corp-mem0-rds-master
  cleanupSchedule: "17 3 * * *"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  migrate:
    ttlSecondsAfterFinished: 86400
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  cleanup:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  # Cold start covers FastEmbed load + first RDS IAM token after model fetch.
  probes:
    startup:
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 36
    liveness:
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  # FastEmbed cache is published by platform CI under the same VERSION as the image.
  # Rendered URI: {{ s3Prefix }}/{{ imageTag }}/{{ archiveName }}
  # IRSA prefix (infra): fastembed/paraphrase-multilingual-MiniLM-L12-v2/
  # Optional s3Uri fully overrides the composed URI (break-glass only).
  modelDelivery:
    enabled: false
    awsRegion: us-east-1
    fetcherImage: public.ecr.aws/aws-cli/aws-cli:2.27.49
    extractorImage: busybox:1.37.0
    s3Prefix: ""
    archiveName: fastembed-paraphrase-multilingual-MiniLM-L12-v2-faf4aa422582.tar.gz
    s3Uri: ""
    mountPath: /models/fastembed
    cacheSizeLimit: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# SEC-03 least-privilege: any component may declare its OWN serviceAccount to get
# a distinct, auditable identity instead of sharing the global one above. Fallback
# rules:
#   - Component WITHOUT serviceAccount  -> uses the global serviceAccount (default).
#   - Component WITH serviceAccount     -> gets its own SA; name defaults to the
#                                          component name when `name` is omitted.
#   - IRSA role ARNs are NEVER inherited from global; declare them explicitly only
#     on the workload that needs AWS access.
# Example (do not enable globally — only for workloads with a real need):
#
# components:
#   accounting:
#     serviceAccount:
#       create: true
#       name: techx-corp-accounting
#       annotations:
#         eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/techx-corp-accounting
#   fraud-detection:
#     serviceAccount:
#       create: true
#       name: techx-corp-fraud-detection
#       annotations:
#         eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/techx-corp-fraud-detection

components:
  ## Demo Components are named objects (services) with several properties
  # demoService:
  ## Enable the component (service)
  #   enabled: true
  #   useDefault:
  ## Use default environment variables
  #     env: true
  ## Image overrides (optional):
  ##   imageOverride.repository + optional tag — full image path (third-party images).
  ##   imageOverride.name — ECR service segment only; keeps default.image.repository/tag
  ##     (use when K8s component name ≠ bake/ECR service name, e.g. load-generator-worker).
  ##   imageOverride.tag alone — pin tag while keeping default repository + component name.
  #   imageOverride: {}
  ## Optional service definitions to apply
  #   service:
  ## Service Type to use for this component. Default is ClusterIP.
  #     type: ClusterIP
  ## Service Port to use to expose this component. Default is nil
  #     port: 8080
  ## Service Node Port to use to expose this component on a NodePort service. Default is nil
  #     nodePort: 30080
  ## Service Annotations to add to this component
  #     annotations: {}
  ## Additional service ports to use to expose this component
  #   ports:
  #     - name: extraServicePort
  #       value: 8081
  ## Environment variables to add to the component's pod
  #   env:
  ## Environment variables that upsert (append + merge) into the `env` specification for this component.
  ## A variable named OTEL_RESOURCE_ATTRIBUTES_EXTRA will have its value appended to the OTEL_RESOURCE_ATTRIBUTES value.
  #   envOverrides:
  ## Pod Scheduling rules for nodeSelector, affinity, tolerations, or topologySpreadConstraints.
  #   schedulingRules:
  #     nodeSelector: {}
  #     affinity: {}
  #     tolerations: []
  #     topologySpreadConstraints: []  # empty list clears default soft spreads
  ## Pod labels to add to this component
  #   podLabels: {}
  ## Pod Annotations to add to this component
  #   podAnnotations: {}
  ## Resources for this component
  #   resources: {}
  ## Container security context for setting user ID (UID), group ID (GID) and other security policies
  #   securityContext:
  ## Ingresses rules to add for the to the component
  # ingress:
  ## Enable the creation of Ingress rules. Default is false
  #   enabled: false
  ## Annotations to add to the ingress rule
  #   annotations: {}
  ## Which Ingress class (controller) to use. Default is unspecified.
  #   ingressClassName: nginx
  ## Hosts definitions for the Ingress rule
  #   hosts:
  #     - host: demo.example.com
  ## Each host can have multiple paths/routes
  #       paths:
  #         - path: /
  #           pathType: Prefix
  #           port: 8080
  ## Optional TLS specifications for the Ingress rule
  #   tls:
  #     - secretName: demo-tls
  #       hosts:
  #         - demo.example.com
  ## Additional ingresses - only created if ingress.enabled is true
  ## Useful for when differently annotated ingress services are required
  ## Each additional ingress needs key "name" set to something unique
  #   additionalIngresses: []
  #     - name: extra-demo-ingress
  #       ingressClassName: nginx
  #       annotations: {}
  #       hosts:
  #         - host: demo.example.com
  #           paths:
  #             - path: /
  #               pathType: Prefix
  #               port: 8080
  #       tls:
  #         - secretName: demo-tls
  #           hosts:
  #             - demo.example.com
  ## Command to use in the container spec, in case you don't want to go with the default command from the image.
  #   command: []
  ## Configuration to for this component; will create a Volume, and Mount backed by an optionally created ConfigMap.
  ## The name, mountPath are required, and one of existingConfigMap or data is required.
  ## If an existing ConfigMap is not provided, the contents under data will be used for the created ConfigMap.
  #   mountedConfigMaps: []
  #     - name: my-config
  #       mountPath: /etc/config
  #       subPath:
  #       existingConfigMap: my-configmap
  #       data:
  #         my-config.yaml: |
  #           key: value
  ## Configuration to create an custom Volume
  #   additionalVolumes:
  #     - name: nginx-logs
  #       hostPath:
  #         path: /var/log/nginx
  #       type: ""
  ## Configuration to mount the custom Volume to the container
  # additionalVolumeMounts:
  #     - name: nginx-logs
  #       mountPath: /var/log/nginx
  # # Kubernetes container health check options
  #   livenessProbe: {}
  #   readinessProbe: {}
  # # Optional init container to run before the pod starts.
  #   initContainers:
  #     - name: <init-container-name>
  #       image: <init-container-image>
  #       command: [list of commands for the init container to run]
  # # Replicas for the component
  #  replicas: 1
  # # Number of old ReplicaSets to retain
  #  revisionHistoryLimit: 10
  # # Optional pod security context for setting user ID (UID), group ID (GID) and other security policies
  # # This will be applied at pod level, can be applied globally for all pods: .Values.default.podSecurityContext
  # # Or it can be applied to a specific component: .Values.components.<component-name>.podSecurityContext
  #    podSecurityContext:
  #      runAsGroup: 65534
  #      runAsNonRoot: true
  #      runAsUser: 65534

  accounting:
    enabled: true
    useDefault:
      env: true
    securityContext:
      runAsUser: 10001
      runAsGroup: 10001
    env:
      - name: KAFKA_ADDR
        value: kafka:9092
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      # SEC-05: sourced from ESO-synced Secret (see secrets-chart / docs/operations/external-secrets.md)
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: techx-corp-postgresql-app
            key: accounting-db-connection-string
      - name: OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED
        value: "false"
    resources:
      # Burstable QoS: cpu limit set to 100m for admission policy compliance
      requests:
        cpu: 20m
        memory: 256Mi
      limits:
        cpu: 100m
        memory: 384Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
      - name: otel-log-dir
        mountPath: /var/log/opentelemetry/dotnet
    initContainers:
      - name: wait-for-kafka
        image: busybox:1.37.0
        command:
          [
            "sh",
            "-c",
            "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;",
          ]
      - name: wait-for-postgresql
        image: busybox:1.37.0
        command:
          [
            "sh",
            "-c",
            "until nc -z -v -w30 postgresql 5432; do echo waiting for postgresql; sleep 2; done;",
          ]

  ad:
    enabled: true
    useDefault:
      env: true
    # Tier C (JVM): see docs/operations/probe-thresholds.md
    readinessProbe:
      grpc:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    livenessProbe:
      grpc:
        port: 8080
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 5
    service:
      port: 8080
    env:
      - name: AD_PORT
        value: "8080"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: OTEL_LOGS_EXPORTER
        value: otlp
    resources:
      # Raised cpu limit to 200m to prevent Java JVM/OTel agent startup probe timeouts
      requests:
        cpu: 10m
        memory: 288Mi
      limits:
        cpu: 200m
        memory: 384Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp

  cart:
    enabled: true
    useDefault:
      env: true
    # Tier B; liveness is tcp so failedReadinessProbe chaos does not restart pods
    readinessProbe:
      grpc:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
    service:
      port: 8080
    env:
      - name: CART_PORT
        value: "8080"
      - name: ASPNETCORE_URLS
        value: http://*:$(CART_PORT)
      - name: VALKEY_ADDR
        value: valkey-cart:6379
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
    resources:
      # 50-user baseline: P95/P99 CPU 17.3m/18.4m, P99 memory 158Mi.
      # Keep startup/probe burst headroom to avoid Kestrel thread-pool starvation.
      requests:
        cpu: 30m
        memory: 192Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # Hot-path under scaled frontend/checkout; Karpenter (default spot-tolerant).
    # Valkey remains singleton; cart pods are stateless clients.
    # Dual metrics: RPS primary; CPU 70% safety valve (HPA uses max).
    # behavior anchor is shared by all HPA-enabled services (must be defined before first alias).
    # Loosened 2026-07-17: higher RPS targets + dampened scale-up (30s stabilize, 50%/30s)
    # and longer scale-down stabilize (120s) to reduce RPS-noise thrash.
    # maxReplicas 12: load-test pin at 6 with CPU ~110%/70% → desired ~10; +headroom.
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
      # .NET service comfortable ~150 RPS/pod (raised from 100 to delay RPS scale-out).
      targetRequestsPerSecond: 150
      behavior: &hpa-behavior-default
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30
            - type: Percent
              value: 50
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
