      grpc:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    livenessProbe:
      grpc:
        port: 8080
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
    service:
      port: 8080
    env:
      - name: PRODUCT_CATALOG_PORT
        value: "8080"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: GOMEMLIMIT
        value: 50MiB
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: techx-corp-postgresql-app
            key: product-catalog-db-connection-string
      - name: OTEL_SEMCONV_STABILITY_OPT_IN
        value: database
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
    resources:
      # Guaranteed QoS (request = limit) for critical path stability
      requests:
        cpu: 150m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    # Hot read path under frontend/checkout; Karpenter spot-tolerant.
    # Highest backend RPS under Locust browse; RPS primary + CPU safety valve.
    # maxReplicas 12: load-test pin at 6 with CPU ~126%/70% → desired ~11; +headroom.
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 55
      # Go backend: raised from 100 → 150 RPS/pod (hot browse path).
      targetRequestsPerSecond: 150
      behavior: *hpa-behavior-default
    initContainers: []

  product-reviews:
    enabled: true
