      fetcherImage: public.ecr.aws/aws-cli/aws-cli:2.27.49
      # busybox: extract verified archive into the model emptyDir.
      extractorImage: busybox:1.37.0
      s3Uri: s3://techx-dev-tf2-ai-models-493499579600/protectai/deberta-v3-base-prompt-injection-v2/89b085cd330414d3e7d9dd787870f315957e1e9f/model.tar.gz
      mountPath: /models
      cacheSizeLimit: 2Gi
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    useDefault:
      env: true
    # Tier B‡ (Python gRPC on 3551 + long LLM RPCs). See probe-thresholds.md.
    # startupProbe: cover post-init cold bind under CPU pressure after model fetch.
    # readiness: gRPC health (process can accept work; may fail when worker pool is full).
    # liveness: tcpSocket so a saturated ThreadPool does not restart a live process
    # (same pattern as cart vs failedReadinessProbe).
    startupProbe:
      grpc:
        port: 3551
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 24
    readinessProbe:
      grpc:
        port: 3551
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 3551
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 5
    service:
      port: 3551
    env:
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: techx-corp-product-reviews
            key: OPENAI_API_KEY
      - name: LLM_MODEL
        value: techx-llm
      - name: LLM_HOST
        value: llm
      - name: LLM_PORT
        value: "8000"
      - name: LLM_BASE_URL
        value: http://$(LLM_HOST):$(LLM_PORT)/v1
      # Shared with Health/Check; keep above concurrent AskProductAIAssistant depth.
      - name: GRPC_MAX_WORKERS
        value: "32"
      - name: PRODUCT_REVIEWS_PORT
        value: "3551"
      - name: PRODUCT_CATALOG_ADDR
        value: product-catalog:8080
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: techx-corp-postgresql-app
            key: product-reviews-db-connection-string
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - name: OTEL_PYTHON_LOG_CORRELATION
        value: "true"
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "false"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
    resources:
      # Burstable QoS: cpu limit set to 200m for admission policy compliance
      requests:
        cpu: 32m
        memory: 1920Mi
      limits:
        cpu: 200m
        memory: 2560Mi
    # Product-page AI reviews (P1); RPS primary; CPU safety valve.
    # Lower RPS/pod than recommendation — LLM + Postgres path is heavier.
    # maxReplicas 6: same band as recommendation until load-test pin data.
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      # LLM + Postgres path: raised from 10 → 20 RPS/pod (less early scale-out).
      targetRequestsPerSecond: 20
      behavior: *hpa-behavior-default
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
    initContainers:
      - name: wait-for-postgresql
        image: busybox:1.37.0
        command:
          [
            "sh",
            "-c",
            "until nc -z -v -w30 postgresql 5432; do echo waiting for postgresql; sleep 2; done;",
          ]

