        existingConfigMap: postgresql-init
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 128Mi
    securityContext:
      runAsUser: 999
      runAsGroup: 999
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    volumeClaimTemplates:
      - metadata:
          name: postgresql-data
        spec:
          accessModes: [ "ReadWriteOnce" ]
          storageClassName: '{{ .defaultValues.storageClassName }}'
