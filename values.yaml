        mountPath: /etc/valkey
        data:
          valkey.conf: |
            appendonly yes
            appendfsync everysec
            save 60 100
            save 300 10
            maxmemory 32mb
            maxmemory-policy allkeys-lru
            loglevel notice
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    volumeClaimTemplates:
      - metadata:
          name: valkey-cart-data
        spec:
          accessModes: [ "ReadWriteOnce" ]
          storageClassName: '{{ .defaultValues.storageClassName }}'
          resources:
            requests:
              storage: 2Gi
    additionalVolumeMounts:
      - name: valkey-cart-data
        mountPath: /data

  # Custom platform image: default.image.repository/opensearch:default.image.tag
  # (src/opensearch/Dockerfile — strips unused plugins). No separate image override.
  opensearch:
    enabled: true
    stateful: true
    schedulingRules: *scheduling-critical
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
    terminationGracePeriodSeconds: 60
    useDefault:
      env: false
    # Singleton search node; non-surge rollout (single-writer data path).
    rollout:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
    # Cold start is JVM-heavy: on 200m CPU, :9200 often binds only after ~4+ minutes
    # (observed ~4m16s). CPU request 500m shortens bootstrap; startupProbe still
    # gates liveness so kubelet does not kill mid-bootstrap if the node is busy.
    # Unhealthy "connection refused" events during the first few minutes are expected
    # until the first successful TCP probe; they do not mean the process crashed.
    startupProbe:
      tcpSocket:
        port: 9200
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 36 # ~6.5 minutes after start (30s + 36*10s)
    readinessProbe:
      tcpSocket:
        port: 9200
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 9200
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    replicas: 1
    ports:
      - name: http
        value: 9200
      - name: transport
        value: 9300
    env:
      - name: OPENSEARCH_JAVA_OPTS
        value: "-Xms400m -Xmx400m"
      - name: discovery.type
        value: single-node
      # K8s pods lack memlock ulimit / IPC_LOCK; memory_lock=true can fail bootstrap.
      - name: bootstrap.memory_lock
        value: "false"
      - name: DISABLE_INSTALL_DEMO_CONFIG
        value: "true"
      - name: DISABLE_SECURITY_PLUGIN
        value: "true"
      - name: cluster.name
        value: demo-cluster
      - name: network.host
        value: "0.0.0.0"
    resources:
      # 200m CPU throttled bootstrap to ~4m+ and left almost no margin under the
      # previous 5m startup window. 500m keeps Guaranteed QoS and realistic cold start.
      requests:
        cpu: 500m
        memory: 1100Mi
      limits:
        cpu: 500m
        memory: 1100Mi
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    mountedEmptyDirs:
      - name: opensearch-data
        mountPath: /usr/share/opensearch/data
      - name: tmp-dir
        mountPath: /tmp

opentelemetry-collector:
  enabled: true
  # Universal DaemonSet: run on Critical MNG and Karpenter (no workload-class selector).
  tolerations:
    - key: workload-class
      operator: Equal
      value: spot-tolerant
      effect: NoSchedule
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  image:
    repository: "otel/opentelemetry-collector-contrib"
  fullnameOverride: otel-collector
  mode: daemonset
  presets:
    # Disabled: hostmetrics + root_path /hostfs blocked otelcol in D-state (disk sleep) on
    # packed Critical MNG nodes, so :13133 never opened and probes saw connection refused.
    # Re-enable only with narrowed scrapers after Critical MNG capacity is healthy.
    hostMetrics:
      enabled: false
    kubernetesAttributes:
      enabled: true
    kubeletMetrics:
      enabled: true
    clusterMetrics:
      enabled: true
    annotationDiscovery:
      metrics:
        enabled: true
  # Packed Critical MNG nodes (t4g.medium ~96% mem) could not finish startup under 200Mi:
  # health :13133 stayed closed or hung → readiness/liveness connection refused → restart storm.
  # Healthy agents already sit ~110–150Mi; leave headroom + raise GOMEMLIMIT (80% of limit).
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 384Mi
  # Block liveness until health extension is serving (slow start under node memory pressure).
  startupProbe:
    httpGet:
      path: /
      port: 13133
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 36
  livenessProbe:
    httpGet:
      path: /
      port: 13133
    initialDelaySeconds: 0
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 13133
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    enabled: true
  ports:
    metrics:
      enabled: true
  config:
    receivers:
      otlp:
        protocols:
          http:
            # Since this collector needs to receive data from the web, enable cors for all origins
            # `allowed_origins` can be refined for your deployment domain
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
      kafkametrics:
        scrapers:
          - brokers
          - topics
          - consumers
        brokers:
          - kafka:9092
        collection_interval: 10s
    exporters:
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
        sending_queue:
          batch: {}
      otlphttp/prometheus:
        endpoint: http://prometheus:9090/api/v1/otlp
        tls:
          insecure: true
        sending_queue:
          batch: {}
      opensearch:
        logs_index: otel-logs
        logs_index_time_format: "yyyy-MM-dd"
        http:
          endpoint: http://opensearch:9200
          tls:
            insecure: true

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resourcedetection:
        detectors: [env, system]
      transform:
        error_mode: ignore
        trace_statements:
          # Sanitize spans to prevent span metrics cardinality explosion
          # caused by non-compliant high cardinality span names:
          # 1. Define missing http.route on key HTTP operations for meaningful operation names
          # 2. Then normalize span names; http server spans lacking http.route default to operations "GET", "POST", etc.
          - context: span
            # FRONTEND SERVICE
            conditions:
              - span.kind == SPAN_KIND_SERVER and resource.attributes["service.name"] == "frontend" and span.attributes["http.route"] == nil
            statements:
              # Workaround for Next.js high cardinality span name issue: https://github.com/vercel/next.js/issues/54694
              - set(span.attributes["http.route"], "/api/cart") where IsMatch(span.attributes["http.target"], "\\/api\\/cart")  # e.g. # /api/cart
              - set(span.attributes["http.route"], "/api/checkout") where IsMatch(span.attributes["http.target"], "\\/api\\/checkout")  # e.g. # /api/checkout
              - set(span.attributes["http.route"], "/api/products/{productId}") where IsMatch(span.attributes["http.target"], "\\/api\\/products\\/.*")  # e.g. /api/products/1YMWWN1N4O
              - set(span.attributes["http.route"], "/api/recommendations") where IsMatch(span.attributes["http.target"], "\\/api\\/recommendations")  # e.g. # /api/recommendations?productIds=...
              - set(span.attributes["http.route"], "/api/data") where IsMatch(span.attributes["http.target"], "\\/api\\/data.*")  # e.g. # " /api/data?contextKeys=telescopes" or /api/data/?contextKeys=cameras
          - context: span
            statements:
              # SANITIZE ALL SPAN NAMES TO PREVENT CARDINALITY EXPLOSION
              - set_semconv_span_name("1.37.0", "unsanitized_span_name")
      resource:
        attributes:
        - key: service.instance.id
          from_attribute: k8s.pod.uid
          action: insert

    connectors:
      spanmetrics: {}

    service:
      pipelines:
        traces:
          processors: [memory_limiter, resourcedetection, resource, transform, batch]
          exporters: [otlp/jaeger, debug, spanmetrics]
        metrics:
          receivers: [otlp, kafkametrics, spanmetrics]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/prometheus, debug]
        logs:
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [opensearch, debug]
      telemetry:
        metrics:
          # detailed self-metrics + OTLP export amplified load on small Critical MNG agents.
          level: basic
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://otel-collector:4318
                    insecure: true

jaeger:
  enabled: true
  fullnameOverride: jaeger
  jaeger:
    # Observability control plane → Critical MNG
    nodeSelector:
      workload-class: critical
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    storage:
      type: memory
    extraEnv:
      - name: MEMORY_MAX_TRACES
        value: "25000"
      - name: PROMETHEUS_ADDR
        value: prometheus:9090
      - name: OTEL_COLLECTOR_HOST
        value: otel-collector
      - name: OTEL_COLLECTOR_PORT_HTTP
        value: "4318"
      - name: JAEGER_HOST
        value: "0.0.0.0"
      - name: JAEGER_GRPC_PORT
        value: "4317"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 600Mi
  userconfig:
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        resource:
          service.name: jaeger
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
                    insecure: true
        logs:
          level: info
    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
      jaeger_query:
        storage:
          traces: memory_backend
          metrics: metrics_backend
        base_path: /jaeger/ui
      jaeger_storage:
        backends:
          memory_backend:
            memory:
              max_traces: ${env:MEMORY_MAX_TRACES}
        metric_backends:
          metrics_backend:
            prometheus:
              endpoint: "http://${env:PROMETHEUS_ADDR}"
              normalize_calls: true
              normalize_duration: true

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:JAEGER_HOST}:${env:JAEGER_GRPC_PORT}

    processors:
      batch: {}

    exporters:
      jaeger_storage_exporter:
        trace_storage: memory_backend

prometheus:
  enabled: true
  alertmanager:
    enabled: false
  configmapReload:
    prometheus:
      enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  server:
    fullnameOverride: prometheus
    # Observability control plane → Critical MNG
    nodeSelector:
      workload-class: critical
    extraFlags:
      - "enable-feature=exemplar-storage"
      - "web.enable-otlp-receiver"
    # emptyDir TSDB: keep retention short so WAL/replay stays bounded on restart.
    retention: 2d
    tsdb:
      out_of_order_time_window: 30m
    otlp:
      keep_identifying_resource_attributes: true
      # Recommended attributes to be promoted to labels.
      promote_resource_attributes:
        - service.instance.id
        - service.name
        - service.namespace
        - service.version
        - cloud.availability_zone
        - cloud.region
        - deployment.environment.name
        # When deploying on Kubernetes, resource attributes used to identify the
        # kubernetes resources in dashboards and alerts.
        - k8s.cluster.name
        - k8s.container.name
        - k8s.cronjob.name
        - k8s.daemonset.name
        - k8s.deployment.name
        - k8s.job.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - container.name
        # When deploying on VMs, resource attributes used to identify
        # the host in dashboards and alerts.
        - host.name
        # PostgreSQL resource attributes produced by the OTel Collector PostgreSQL receiver
        # and used in dashboards and alerts.
        # See https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/postgresqlreceiver/metadata.yaml
        - postgresql.database.name
        - postgresql.schema.name
        - postgresql.table.name
        - postgresql.index.name
    persistentVolume:
      enabled: false
    service:
      servicePort: 9090
    # Working set was ~398Mi against a 400Mi limit (probe timeouts + liveness kill loop).
    # OTLP receiver + exemplars + k8s SD need headroom on Critical MNG.
    resources:
      requests:
        cpu: 150m
        memory: 400Mi
      limits:
        cpu: 750m
        memory: 768Mi
    # WAL/config load observed ~25–30s; block liveness until ready to avoid restart storms.
    startupProbe:
      enabled: true
      periodSeconds: 10
      failureThreshold: 30
      timeoutSeconds: 10
    readinessProbeInitialDelay: 10
    readinessProbePeriodSeconds: 10
    readinessProbeTimeout: 10
    readinessProbeFailureThreshold: 3
    readinessProbeSuccessThreshold: 1
    livenessProbeInitialDelay: 30
    livenessProbePeriodSeconds: 20
    livenessProbeTimeout: 10
    livenessProbeFailureThreshold: 3
    livenessProbeSuccessThreshold: 1
    securityContext:
      runAsUser: 65534
      runAsNonRoot: true
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

grafana:
  enabled: true
  fullnameOverride: grafana
  # Observability control plane → Critical MNG
  nodeSelector:
    workload-class: critical
  extraEmptyDirMounts:
    - name: grafana-tmp
      mountPath: /tmp
  testFramework:
    enabled: false
  grafana.ini:
    auth:
      disable_login_form: true
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Admin
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      serve_from_sub_path: true
  # SEC-05: admin credentials from ESO Secret techx-corp-grafana-admin
  admin:
    existingSecret: techx-corp-grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  plugins:
    - grafana-opensearch-datasource
  sidecar:
    alerts:
      enabled: true
    dashboards:
      enabled: true
    datasources:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 256Mi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# Metrics Server — required for HPA (autoscaling/v2 CPU & memory metrics).
# Set enabled: false if the cluster already runs metrics-server (e.g. kube-system).
metrics-server:
  enabled: true
  fullnameOverride: metrics-server
  # HPA dependency — pin to critical MNG floor
  nodeSelector:
    workload-class: critical
  # EKS / many managed node groups: kubelet serving certs are not trusted by default.
  args:
    - --kubelet-insecure-tls
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 200Mi

