  postgresql:
    enabled: true
    stateful: true
    schedulingRules: *scheduling-critical
    podSecurityContext:
      fsGroup: 999
    terminationGracePeriodSeconds: 60
    useDefault:
      env: false
    # NOTE: Singleton data/broker component. Non-surge rollout is used because it relies on single-writer / non-HA storage, which does not support zero-downtime rolling updates.
    rollout:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
    # Tier C (Guaranteed 100m CPU; compose uses timeout 5 / multi-retry)
    readinessProbe:
      tcpSocket:
        port: 5432
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    livenessProbe:
      tcpSocket:
        port: 5432
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 5
    imageOverride:
      repository: "postgres"
      tag: "17.6"
    # Keep entrypoint so init scripts still run; raise slots for multi-replica apps.
    # Default 100 was exhausted under product-catalog HPA (idle slots ~70+, errors:
    # "remaining connection slots are reserved for roles with the SUPERUSER attribute").
    command:
      - docker-entrypoint.sh
      - postgres
      - -c
      - max_connections=200
    replicas: 1
    service:
      port: 5432
    podAnnotations:
      io.opentelemetry.discovery.metrics/enabled: "true"
      io.opentelemetry.discovery.metrics/scraper: postgresql
      # RESIDUAL (SEC-05): OTel scrape config cannot use secretKeyRef; keep in sync with
      # postgresql-admin password after rotation, or disable metrics scrape. Tracked for follow-up.
      io.opentelemetry.discovery.metrics/config: |
        username: root
        password: otel
        metrics:
          postgresql.blks_hit:
            enabled: true
          postgresql.blks_read:
            enabled: true
          postgresql.tup_fetched:
            enabled: true
          postgresql.tup_returned:
            enabled: true
          postgresql.tup_inserted:
            enabled: true
          postgresql.tup_updated:
            enabled: true
          postgresql.tup_deleted:
            enabled: true
          postgresql.deadlocks:
            enabled: true
        tls:
          insecure: true
    env:
      - name: POSTGRES_USER
        valueFrom:
          secretKeyRef:
            name: techx-corp-postgresql-admin
            key: POSTGRES_USER
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: techx-corp-postgresql-admin
            key: POSTGRES_PASSWORD
      - name: POSTGRES_DB
        valueFrom:
          secretKeyRef:
            name: techx-corp-postgresql-admin
            key: POSTGRES_DB
      - name: PGDATA
        value: /var/lib/postgresql/data/pgdata
    mountedConfigMaps:
      - name: postgresql-init
        mountPath: /docker-entrypoint-initdb.d
        existingConfigMap: postgresql-init
    resources:
      # 50-user baseline: P95/P99 CPU 52.7m/72.5m, P99 memory 50Mi.
      # Load-test: top ~402m CPU / 133Mi mem at default 400m/256Mi; raise for 200 conns.
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    securityContext:
      runAsUser: 999
      runAsGroup: 999
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    volumeClaimTemplates:
      - metadata:
          name: postgresql-data
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: "{{ .defaultValues.storageClassName }}"
          resources:
            requests:
              storage: 5Gi
    additionalVolumeMounts:
      - name: postgresql-data
        mountPath: /var/lib/postgresql/data

  valkey-cart:
    enabled: true
    stateful: true
    schedulingRules: *scheduling-critical
    podSecurityContext:
      fsGroup: 1000
    terminationGracePeriodSeconds: 60
    useDefault:
      env: false
    # NOTE: Singleton data/broker component. Non-surge rollout is used because it relies on single-writer / non-HA storage, which does not support zero-downtime rolling updates.
    rollout:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
    # Tier A (fast cache bind)
    readinessProbe:
      tcpSocket:
        port: 6379
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 6379
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    imageOverride:
      repository: "valkey/valkey"
      tag: "9.0.1-alpine3.23"
    replicas: 1
    ports:
      - name: valkey-cart
        value: 6379
    podAnnotations:
      io.opentelemetry.discovery.metrics/enabled: "true"
      io.opentelemetry.discovery.metrics/scraper: redis
      io.opentelemetry.discovery.metrics/config: |
        username: valkey
        collection_interval: 10s
    resources:
      # 50-user baseline: P99 CPU 5.05m, P99 memory 7.33Mi; leave burst/OOM headroom.
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 32Mi
    securityContext:
      runAsUser: 999 # valkey
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    mountedConfigMaps:
      - name: valkey-cart-config
        mountPath: /etc/valkey
        data:
          valkey.conf: |
            appendonly yes
            appendfsync everysec
            save 60 100
            save 300 10
            maxmemory 32mb
            maxmemory-policy allkeys-lru
            loglevel notice
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    volumeClaimTemplates:
      - metadata:
          name: valkey-cart-data
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: "{{ .defaultValues.storageClassName }}"
          resources:
            requests:
              storage: 2Gi
    additionalVolumeMounts:
      - name: valkey-cart-data
        mountPath: /data

  # Custom platform image: default.image.repository/opensearch:default.image.tag
  # (src/opensearch/Dockerfile — strips unused plugins but KEEPS opensearch-security
  # for SEC-06 HTTPS + basic auth). No separate image override.
  opensearch:
    enabled: true
    stateful: true
    schedulingRules: *scheduling-critical
    podSecurityContext:
      fsGroup: 1000
      runAsUser: 1000
    terminationGracePeriodSeconds: 60
    useDefault:
      env: false
    # Singleton search node; non-surge rollout (single-writer data path).
    rollout:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
    # Cold start is JVM-heavy. On 100m CPU after PVC recovery, :9200 can bind only
    # after ~6.5m — equal to the old failureThreshold 36 budget, so kubelet SIGTERM
    # (exit 143) restarts the pod in a loop (connection refused is mid-bootstrap).
    # 500m CPU shortens bootstrap; extended startupProbe still gates liveness if the
    # node is busy. Early "connection refused" probe events are expected until :9200 binds.
    startupProbe:
      tcpSocket:
        port: 9200
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 60 # ~10.5 minutes after start (30s + 60*10s)
    readinessProbe:
      tcpSocket:
        port: 9200
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 9200
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    replicas: 1
    ports:
      - name: http
        value: 9200
      - name: transport
        value: 9300
    env:
      - name: OPENSEARCH_JAVA_OPTS
        value: "-Xms400m -Xmx400m"
      - name: discovery.type
        value: single-node
      # K8s pods lack memlock ulimit / IPC_LOCK; memory_lock=true can fail bootstrap.
      - name: bootstrap.memory_lock
        value: "false"
      # SEC-06: Security plugin is enabled (DISABLE_SECURITY_PLUGIN removed).
      # The security plugin requires TLS material at bootstrap. For this single-node
      # log store we install OpenSearch demo certs (self-signed) so the plugin can
      # load; clients use HTTPS with tls.insecure / skip-verify on the cluster network.
      # Setting this to "true" without mounting custom PEM certs causes:
      #   OpenSearchException[No SSL configuration found]
      #   → CrashLoopBackOff (failed to load OpenSearchSecurityPlugin).
      - name: DISABLE_INSTALL_DEMO_CONFIG
        value: "false"
      # Admin password is injected via OPENSEARCH_INITIAL_ADMIN_PASSWORD from K8s Secret
      # techx-corp-opensearch (ESO-synced from ASM techx-corp/*/opensearch).
      # Must meet OpenSearch strength rules: ≥8 chars, upper, lower, digit, special.
      # This env bootstraps the built-in admin user on first node start; PVC persists it.
      - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: techx-corp-opensearch
            key: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      - name: cluster.name
        value: demo-cluster
      - name: network.host
        value: "0.0.0.0"
    resources:
      # Guaranteed QoS (request = limit). 500m CPU shortens JVM + index recovery so
      # startupProbe can pass after PVC encrypt-migrate / cold node schedules.
      requests:
        cpu: 500m
        memory: 960Mi
      limits:
        cpu: 500m
        memory: 960Mi
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    volumeClaimTemplates:
      - metadata:
          name: opensearch-data
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: "{{ .defaultValues.storageClassName }}"
          resources:
            requests:
              storage: 10Gi
    additionalVolumeMounts:
      - name: opensearch-data
        mountPath: /usr/share/opensearch/data
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp

opentelemetry-collector:
  enabled: true
  # Universal DaemonSet: run on Critical MNG and Karpenter (no workload-class selector).
  tolerations:
    - key: workload-class
      operator: Equal
      value: spot-tolerant
      effect: NoSchedule
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  image:
    repository: "otel/opentelemetry-collector-contrib"
  fullnameOverride: otel-collector
  podLabels:
    app.kubernetes.io/component: otel-collector
    app.kubernetes.io/part-of: techx-corp
  mode: daemonset
  presets:
    # Disabled: hostmetrics + root_path /hostfs blocked otelcol in D-state (disk sleep) on
    # packed Critical MNG nodes, so :13133 never opened and probes saw connection refused.
    # Re-enable only with narrowed scrapers after Critical MNG capacity is healthy.
    hostMetrics:
      enabled: false
    kubernetesAttributes:
      enabled: true
    kubeletMetrics:
      enabled: true
    clusterMetrics:
      enabled: true
    annotationDiscovery:
      metrics:
        enabled: true
  # Packed Critical MNG nodes (t4g.medium ~96% mem) could not finish startup under 200Mi:
  # health :13133 stayed closed or hung → readiness/liveness connection refused → restart storm.
  # Healthy agents already sit ~110–150Mi; leave headroom + raise GOMEMLIMIT (80% of limit).
  resources:
    # Guaranteed QoS (request = limit) for platform DaemonSet agent
    requests:
      cpu: 20m
      memory: 128Mi
    limits:
      cpu: 20m
      memory: 128Mi
  # Block liveness until health extension is serving (slow start under node memory pressure).
  startupProbe:
    httpGet:
      path: /
      port: 13133
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 36
  livenessProbe:
    httpGet:
      path: /
      port: 13133
    initialDelaySeconds: 0
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 13133
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    enabled: true
  ports:
    metrics:
      enabled: true
  # SEC-06: OpenSearch basic auth credentials injected from ESO-synced Secret.
  # Used by the basicauth/opensearch extension in the collector config below.
  extraEnvs:
    - name: OPENSEARCH_USERNAME
      valueFrom:
        secretKeyRef:
          name: techx-corp-opensearch
          key: username
    - name: OPENSEARCH_PASSWORD
      valueFrom:
        secretKeyRef:
          name: techx-corp-opensearch
          key: password
  config:
    receivers:
      otlp:
        protocols:
          http:
            # Since this collector needs to receive data from the web, enable cors for all origins
            # `allowed_origins` can be refined for your deployment domain
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
      kafkametrics:
        scrapers:
          - brokers
          - topics
          - consumers
        brokers:
          - kafka:9092
        collection_interval: 10s
    exporters:
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 2048
      otlphttp/prometheus:
        endpoint: http://prometheus:9090/api/v1/otlp
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 2048
      opensearch:
        logs_index: otel-logs
        logs_index_time_format: "yyyy-MM-dd"
        http:
          # SEC-06: security plugin serves HTTPS (demo self-signed certs on single-node).
          endpoint: https://opensearch:9200
          tls:
            insecure_skip_verify: true
          # SEC-06: basic auth credentials from ESO-synced Secret techx-corp-opensearch.
          # The otel-collector DaemonSet mounts these via secretKeyRef (see below).
          auth:
            authenticator: basicauth/opensearch
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 2048

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 5s
        send_batch_size: 1024
        send_batch_max_size: 2048
      resourcedetection:
        detectors: [env, system]
      transform:
        error_mode: ignore
        trace_statements:
          # Sanitize spans to prevent span metrics cardinality explosion
          # caused by non-compliant high cardinality span names:
          # 1. Define missing http.route on key HTTP operations for meaningful operation names
          # 2. Then normalize span names; http server spans lacking http.route default to operations "GET", "POST", etc.
          - context: span
            # FRONTEND SERVICE
            conditions:
              - span.kind == SPAN_KIND_SERVER and resource.attributes["service.name"] == "frontend" and span.attributes["http.route"] == nil
            statements:
              # Workaround for Next.js high cardinality span name issue: https://github.com/vercel/next.js/issues/54694
              - set(span.attributes["http.route"], "/api/cart") where IsMatch(span.attributes["http.target"], "\\/api\\/cart") # e.g. # /api/cart
              - set(span.attributes["http.route"], "/api/checkout") where IsMatch(span.attributes["http.target"], "\\/api\\/checkout") # e.g. # /api/checkout
              - set(span.attributes["http.route"], "/api/products/{productId}") where IsMatch(span.attributes["http.target"], "\\/api\\/products\\/.*") # e.g. /api/products/1YMWWN1N4O
              - set(span.attributes["http.route"], "/api/recommendations") where IsMatch(span.attributes["http.target"], "\\/api\\/recommendations") # e.g. # /api/recommendations?productIds=...
              - set(span.attributes["http.route"], "/api/data") where IsMatch(span.attributes["http.target"], "\\/api\\/data.*") # e.g. # " /api/data?contextKeys=telescopes" or /api/data/?contextKeys=cameras
          - context: span
            statements:
              # SANITIZE ALL SPAN NAMES TO PREVENT CARDINALITY EXPLOSION
              - set_semconv_span_name("1.37.0", "unsanitized_span_name")
      # APM Dashboard filters on these resource attributes (promoted to Prometheus
      # labels via promote_resource_attributes). Defaults match production; override
      # in values-dev.yaml (development / techx-corp-dev). Without them Grafana shows
      # <<not defined>> and empty service lists.
      resource:
        attributes:
          - key: service.instance.id
            from_attribute: k8s.pod.uid
            action: insert
          - key: deployment.environment.name
            value: production
            action: upsert
          - key: service.namespace
            value: techx-corp-prod
            action: upsert

    connectors:
      # The default 60s flush interval leaves fewer than two samples in the
      # Prometheus Adapter rate window, so the HPA sees 0 RPS under load.
      spanmetrics:
        metrics_flush_interval: 15s

    extensions:
      health_check: {}
      # SEC-06: BasicAuth extension for OpenSearch exporter.
      # Credentials are injected via env vars from K8s Secret techx-corp-opensearch.
      basicauth/opensearch:
        client_auth:
          username: ${env:OPENSEARCH_USERNAME}
          password: ${env:OPENSEARCH_PASSWORD}

    service:
      extensions: [basicauth/opensearch, health_check]
      pipelines:
        traces:
          processors:
            [memory_limiter, resourcedetection, resource, transform, batch]
          exporters: [otlp/jaeger, debug, spanmetrics]
        metrics:
          receivers: [otlp, kafkametrics, spanmetrics]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/prometheus, debug]
        logs:
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [opensearch, debug]
      telemetry:
        metrics:
          # detailed self-metrics + OTLP export amplified load on small Critical MNG agents.
          level: basic
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://otel-collector:4318
                    insecure: true

jaeger:
  enabled: true
  fullnameOverride: jaeger
  jaeger:
    # Observability control plane → Critical MNG
    nodeSelector:
      workload-class: critical
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    storage:
      type: memory
    extraEnv:
      # Cap in-memory backend size so multi-service OTLP ingest cannot grow past the cgroup limit.
      # 25000 traces under load exceeded 1536Mi (~6 min) and OOMKilled (exit 137 / CrashLoopBackOff).
      - name: MEMORY_MAX_TRACES
        value: "10000"
      - name: PROMETHEUS_ADDR
        value: prometheus:9090
      - name: OTEL_COLLECTOR_HOST
        value: otel-collector
      - name: OTEL_COLLECTOR_PORT_HTTP
        value: "4318"
      - name: JAEGER_HOST
        value: "0.0.0.0"
      - name: JAEGER_GRPC_PORT
        value: "4317"
    resources:
      # Burstable QoS: cpu limit set to 100m for admission policy compliance
      requests:
        cpu: 20m
        memory: 384Mi
      limits:
        cpu: 100m
        memory: 1Gi
  userconfig:
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        resource:
          service.name: jaeger
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
                    insecure: true
        logs:
          level: info
    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
      jaeger_query:
        storage:
          traces: memory_backend
          metrics: metrics_backend
        base_path: /jaeger/ui
      jaeger_storage:
        backends:
          memory_backend:
            memory:
              max_traces: ${env:MEMORY_MAX_TRACES}
        metric_backends:
          metrics_backend:
            prometheus:
              endpoint: "http://${env:PROMETHEUS_ADDR}"
              normalize_calls: true
              normalize_duration: true

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:JAEGER_HOST}:${env:JAEGER_GRPC_PORT}

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
        send_batch_max_size: 2048

    exporters:
      jaeger_storage_exporter:
        trace_storage: memory_backend

prometheus:
  enabled: true
  alertmanager:
    enabled: false
  configmapReload:
    prometheus:
      enabled: false
  kube-state-metrics:
    enabled: true
    # Expose only the node-placement labels required by capacity alerts.
    metricLabelsAllowlist:
      - nodes=[workload-class,karpenter.sh/nodepool,karpenter.sh/capacity-type,topology.kubernetes.io/zone]
    resources:
      # Burstable QoS: cpu limit set to 50m for admission policy compliance
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 500Mi
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  # Karpenter exposes controller, scheduler, NodePool usage/limit, and
  # cluster-state metrics on the in-cluster http-metrics service port.
  extraScrapeConfigs: |
    - job_name: karpenter
      static_configs:
        - targets:
            - karpenter.kube-system.svc.cluster.local:8080
  server:
    fullnameOverride: prometheus
    # Observability control plane → Critical MNG
    nodeSelector:
      workload-class: critical
    extraFlags:
      - "enable-feature=exemplar-storage"
      - "web.enable-otlp-receiver"
    # emptyDir TSDB: keep retention short so WAL/replay stays bounded on restart.
    retention: 2d
    tsdb:
      out_of_order_time_window: 30m
    otlp:
      keep_identifying_resource_attributes: true
      # Recommended attributes to be promoted to labels.
      promote_resource_attributes:
        - service.instance.id
        - service.name
        - service.namespace
        - service.version
        - cloud.availability_zone
        - cloud.region
        - deployment.environment.name
        # When deploying on Kubernetes, resource attributes used to identify the
        # kubernetes resources in dashboards and alerts.
        - k8s.cluster.name
        - k8s.container.name
        - k8s.cronjob.name
        - k8s.daemonset.name
        - k8s.deployment.name
        - k8s.job.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - container.name
        # When deploying on VMs, resource attributes used to identify
        # the host in dashboards and alerts.
        - host.name
        # PostgreSQL resource attributes produced by the OTel Collector PostgreSQL receiver
        # and used in dashboards and alerts.
        # See https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/postgresqlreceiver/metadata.yaml
        - postgresql.database.name
        - postgresql.schema.name
        - postgresql.table.name
        - postgresql.index.name
    persistentVolume:
      enabled: true
      storageClass: gp3-encrypted
      size: 8Gi
    service:
      servicePort: 9090
    # PVC + OTLP + exemplars: WAL replay (~50s) and head block exceed the former
    # 2Gi limit (OOMKilled exit 137 / CrashLoop). Request stays below Critical
    # t4g.large packing pressure; limit covers replay spikes.
    resources:
      # Guaranteed QoS (request = limit) for observability platform core
      requests:
        cpu: 200m
        memory: 1792Mi
      limits:
        cpu: 200m
        memory: 1792Mi
    # WAL/config load observed ~50s under load; block liveness until ready.
    startupProbe:
      enabled: true
      periodSeconds: 10
      failureThreshold: 36
      timeoutSeconds: 10
    readinessProbeInitialDelay: 10
    readinessProbePeriodSeconds: 10
    readinessProbeTimeout: 10
    readinessProbeFailureThreshold: 3
    readinessProbeSuccessThreshold: 1
    livenessProbeInitialDelay: 30
    livenessProbePeriodSeconds: 20
    livenessProbeTimeout: 10
    livenessProbeFailureThreshold: 3
    livenessProbeSuccessThreshold: 1
    securityContext:
      runAsUser: 65534
      runAsNonRoot: true
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

grafana:
  enabled: true
  fullnameOverride: grafana
  # Align with the egress-proxy caller selector used during Mandate 17 C2.
  podLabels:
    opentelemetry.io/name: grafana
  # The persistent storage uses fsGroup 472; the root/CHOWN init container is unnecessary.
  initChownData:
    enabled: false
  deploymentStrategy:
    type: Recreate
  # Observability control plane → Critical MNG
  nodeSelector:
    workload-class: critical
  extraEmptyDirMounts:
    - name: grafana-tmp
      mountPath: /tmp
  testFramework:
    enabled: false
  grafana.ini:
    plugins:
      # Keep chart-requested plugins, but do not update bundled plugins at startup.
      # Bundled plugin paths are part of Grafana's read-only root filesystem.
      preinstall_auto_update: false
    # SEC-02: require login, disable anonymous access (no anonymous Admin)
    auth:
      disable_login_form: false
    auth.anonymous:
      enabled: false
    # Keep "Skip" available on the change-password screen if password is still "admin".
    # Grafana has NO ini flag to hide that screen; the UI hardcodes it when the typed
    # password is the literal string "admin" (see LoginCtrl.tsx). To fully remove the
    # interstitial, set admin-password in ASM .../grafana to anything other than "admin".
    auth.basic:
      password_policy: false
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      serve_from_sub_path: true
  # SEC-05: admin credentials from ESO Secret techx-corp-grafana-admin
  # Do NOT use admin-password value "admin" — Grafana always shows change-password UI then.
  admin:
    existingSecret: techx-corp-grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  # SEC-06: OpenSearch basic auth credentials injected into Grafana container env.
  # Used by the provisioned opensearch.yaml datasource (${OPENSEARCH_USERNAME} / ${OPENSEARCH_PASSWORD}).
  envValueFrom:
    OPENSEARCH_USERNAME:
      secretKeyRef:
        name: techx-corp-opensearch
        key: username
    OPENSEARCH_PASSWORD:
      secretKeyRef:
        name: techx-corp-opensearch
        key: password
    # Discord alert webhook — used by grafana/provisioning/alerting/contact-points.yaml
    # Secret quản lý qua AWS Secrets Manager + ESO (secrets-chart).
    # ASM path: techx-corp/production/grafana-discord → {"webhook-url":"<url>"}
    # K8s Secret techx-corp-grafana-discord được ESO tạo tự động.
    DISCORD_WEBHOOK_URL:
      secretKeyRef:
        name: techx-corp-grafana-discord
        key: webhook-url
    # AIOps inbound Grafana webhook auth — used by grafana/provisioning/alerting/contact-points.yaml.
    # ASM path: techx-corp/production/aiops-grafana-webhook → {"AIOPS_GRAFANA_WEBHOOK_SECRET":"<secret>"}
    # K8s Secret techx-corp-aiops-grafana-webhook được ESO tạo tự động.
    AIOPS_GRAFANA_WEBHOOK_SECRET:
      secretKeyRef:
        name: techx-corp-aiops-grafana-webhook
        key: AIOPS_GRAFANA_WEBHOOK_SECRET
  env:
    AIOPS_GRAFANA_WEBHOOK_URL: http://aiops-runtime:8080/api/v1/events/grafana
  plugins:
    # Pin plugin downloads so Grafana startup does not select an unpublished latest artifact.
    - grafana-opensearch-datasource@2.33.1@https://grafana.com/api/plugins/grafana-opensearch-datasource/versions/2.33.1/download?os=linux&arch=arm64
    - grafana-athena-datasource@3.2.0@https://grafana.com/api/plugins/grafana-athena-datasource/versions/3.2.0/download?os=linux&arch=arm64
  sidecar:
    alerts:
      enabled: true
      # Avoid runtime reload through Grafana admin API.
      # The live cluster has shown 401 on /api/admin/provisioning/alerting/reload
      # when the persisted Grafana admin password drifts from the Kubernetes Secret.
      # Init mode makes alert provisioning deterministic on Grafana pod rollout.
      skipReload: true
      initAlerts: true
    dashboards:
      enabled: true
    datasources:
      enabled: true
      # Datasources must exist before Grafana's startup provisioning pass.
      # The reload endpoint depends on the admin Secret matching Grafana's
      # database password; use init provisioning so Athena is loaded even when
      # the sidecar hot-reload call is rejected after a password reset.
      initDatasources: true
      watchMethod: LIST
      skipReload: true
    resources:
      # kubectl top sidecars: sc-alerts ~74Mi, sc-dashboard ~75Mi, sc-datasources ~73Mi each.
      # P99 per sidecar: ~75Mi. 80Mi request per sidecar is sufficient.
      requests:
        cpu: 5m
        memory: 80Mi
      limits:
        cpu: 100m
        memory: 128Mi
  resources:
    # Burstable QoS: cpu limit set to 100m for admission policy compliance
    requests:
      cpu: 20m
      memory: 448Mi
    limits:
      cpu: 100m
      memory: 768Mi
  persistence:
    enabled: true
    storageClassName: gp3-encrypted
    size: 1Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# Metrics Server — required for HPA (autoscaling/v2 CPU metrics; memory optional).
# Set enabled: false if the cluster already runs metrics-server (e.g. kube-system).
metrics-server:
  enabled: true
  fullnameOverride: metrics-server
  # HPA dependency — pin to critical MNG floor
  nodeSelector:
    workload-class: critical
  # EKS / many managed node groups: kubelet serving certs are not trusted by default.
  args:
    - --kubelet-insecure-tls
  resources:
    # Raised cpu limit to 50m to prevent /livez probe timeouts under scraping load
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 32Mi

# Prometheus Adapter — custom/external metrics API for request-rate (RPS) HPA.
# Reads OTel request counters already scraped into in-cluster Prometheus.
# Set enabled: false to fall back to CPU-only HPA (targets stay in values but External metrics fail closed).
# Ops: docs/operations/request-metric-hpa.md
prometheus-adapter:
  enabled: true
  fullnameOverride: prometheus-adapter
  # Same Critical floor as metrics-server / Prometheus (APIService reliability).
  nodeSelector:
    workload-class: critical
  prometheus:
    # In-release Prometheus (server.fullnameOverride: prometheus).
    url: http://prometheus
    port: 9090
  # Resource metrics remain Metrics Server; disable adapter default resource rules.
  rules:
    default: false
    # External metrics: total RPS by service_name (OTel / spanmetrics).
    # HPA External + AverageValue divides by current replica count → per-pod target.
    external:
      # gRPC backends (product-catalog, cart, currency, checkout, recommendation, …)
      - seriesQuery: 'rpc_server_duration_milliseconds_count{service_name!=""}'
        resources:
          namespaced: false
        name:
          matches: ".*"
          as: "http_requests_per_second"
        metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[2m])) by (service_name) or (sum(<<.Series>>{<<.LabelMatchers>>} * 0) by (service_name))'
      # HTTP server metrics (frontend Next.js and other HTTP services)
      - seriesQuery: 'http_server_duration_milliseconds_count{service_name!=""}'
        resources:
          namespaced: false
        name:
          matches: ".*"
          as: "http_requests_per_second"
        metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[2m])) by (service_name) or (sum(<<.Series>>{<<.LabelMatchers>>} * 0) by (service_name))'
      # Alternate HTTP duration naming (seconds unit)
      - seriesQuery: 'http_server_request_duration_seconds_count{service_name!=""}'
        resources:
          namespaced: false
        name:
          matches: ".*"
          as: "http_requests_per_second"
        metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[2m])) by (service_name) or (sum(<<.Series>>{<<.LabelMatchers>>} * 0) by (service_name))'
      # Alternate HTTP duration naming (seconds unit) or spanmetrics fallback
      - seriesQuery: 'traces_span_metrics_calls_total{service_name!=""}'
        resources:
          namespaced: false
        name:
          matches: ".*"
          as: "http_requests_per_second"
        metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[2m])) by (service_name) or (sum(<<.Series>>{<<.LabelMatchers>>} * 0) by (service_name))'
  resources:
    # Guaranteed QoS (request = limit) for critical External Metrics API stability
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  replicas: 1

# Change trail: @hungxqt - 2026-07-23 - Raise frontend-proxy memory/CPU after OOMKilled 503 outage.
