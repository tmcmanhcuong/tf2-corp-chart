              secretKeyRef:
                name: techx-corp-flagd-ui
                key: SECRET_KEY_BASE
          - name: PHX_HOST
            value: localhost
          - name: PHX_SERVER
            value: "true"
        resources:
          # Burstable QoS: cpu limit set to 20m for admission policy compliance
          requests:
            cpu: 5m
            memory: 144Mi
          limits:
            cpu: 20m
            memory: 192Mi
        securityContext:
          runAsUser: 10001
          runAsGroup: 10001
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        volumeMounts:
          - name: config-rw
            mountPath: /app/data
          - name: tmp-dir
            mountPath: /tmp
    initContainers:
      - name: init-config
        image: busybox:1.37.0
        command:
          [
            "sh",
            "-c",
            "cp /config-ro/demo.flagd.json /config-rw/demo.flagd.json && cat /config-rw/demo.flagd.json",
          ]
        volumeMounts:
          - mountPath: /config-ro
            name: config-ro
          - mountPath: /config-rw
