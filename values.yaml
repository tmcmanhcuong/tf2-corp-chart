# yaml-language-server: $schema=./values.schema.json
#
# SEC-05: Sensitive credentials use secretKeyRef → ESO-synced Secrets.
# Deploy order: ESO + ClusterSecretStore → techx-corp-secrets → wait Ready → techx-corp.
# Local demo with plaintext: -f values-demo.yaml (never for production).
# Docs: docs/operations/external-secrets.md

externalSecrets:
  enabled: true
  secretStoreName: aws-secretsmanager
  namespace: techx-corp

default:
  storageClassName: gp2
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    minReadySeconds: 10
    progressDeadlineSeconds: 300
  # List of environment variables applied to all components
  env:
    - name: OTEL_SERVICE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: "metadata.labels['app.kubernetes.io/component']"
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector
    - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      value: cumulative
  # Allows overriding and additions to .Values.default.env
  envOverrides: []
  #  - name: OTEL_K8S_NODE_NAME
  #    value: "someConstantValue"
  image:
    # Image format: REGISTRY/PROJECT/SERVICE:VERSION
    #   e.g. 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-corp/ad:sha-a1b2c3d
    # repository = REGISTRY/PROJECT (service name is appended by the chart template)
    #   helm ... --set default.image.repository=<ACCOUNT>.dkr.ecr.<REGION>.amazonaws.com/techx-corp
    #            --set default.image.tag=sha-a1b2c3d
    repository: 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-corp
    # Tag/VERSION only (no service suffix). Service is part of the repository path.
    tag: "1.0"
    pullPolicy: IfNotPresent
    pullSecrets: []
  # Default # of replicas for all components
  replicas: 1
  # default revisionHistoryLimit for all components (number of old ReplicaSets to retain)
  revisionHistoryLimit: 10
  # Default scheduling: hard placement on Karpenter spot-tolerant nodes.
  # nodeSelector is the hard requirement; Spot capacity-type affinity is preference only.
  # NodePool weight (infra) decides Spot vs On-Demand fallback — do not treat affinity as primary/fallback.
  # topologySpreadConstraints are soft balancing only (ScheduleAnyway); labelSelector is template-injected.
  # Critical components override with nodeSelector workload-class=critical (no Karpenter toleration)
  # and topologySpreadConstraints: [] (opt-out — small critical MNG floor).
  # See techx-corp-infra/docs/workload-placement.md and docs/operations/workload-placement.md
  schedulingRules: &scheduling-spot-tolerant
    nodeSelector:
      workload-class: spot-tolerant
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: karpenter.sh/capacity-type
                  operator: In
                  values:
                    - spot
    tolerations:
      - key: workload-class
        operator: Equal
        value: spot-tolerant
        effect: NoSchedule
    # Soft multi-AZ / multi-node balancing within the spot-tolerant pool only.
    # Does not weaken hard nodeSelector or tolerations; ScheduleAnyway never blocks on capacity.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
  # Default podSecurityContext for all components
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  # Default securityContext for all components
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # Default initContainerSecurityContext for all components
  initContainerSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

components:
  ## Demo Components are named objects (services) with several properties
  # demoService:
  ## Enable the component (service)
  #   enabled: true
  #   useDefault:
  ## Use default environment variables
  #     env: true
  ## Override Image repository and Tag. Tag will use appVersion as default.
  ## Component's name will be applied to end of this value.
  #   imageOverride: {}
  ## Optional service definitions to apply
  #   service:
  ## Service Type to use for this component. Default is ClusterIP.
  #     type: ClusterIP
  ## Service Port to use to expose this component. Default is nil
  #     port: 8080
  ## Service Node Port to use to expose this component on a NodePort service. Default is nil
  #     nodePort: 30080
  ## Service Annotations to add to this component
  #     annotations: {}
  ## Additional service ports to use to expose this component
  #   ports:
  #     - name: extraServicePort
  #       value: 8081
  ## Environment variables to add to the component's pod
  #   env:
  ## Environment variables that upsert (append + merge) into the `env` specification for this component.
  ## A variable named OTEL_RESOURCE_ATTRIBUTES_EXTRA will have its value appended to the OTEL_RESOURCE_ATTRIBUTES value.
  #   envOverrides:
  ## Pod Scheduling rules for nodeSelector, affinity, tolerations, or topologySpreadConstraints.
  #   schedulingRules:
  #     nodeSelector: {}
  #     affinity: {}
  #     tolerations: []
  #     topologySpreadConstraints: []  # empty list clears default soft spreads
  ## Pod labels to add to this component
  #   podLabels: {}
  ## Pod Annotations to add to this component
  #   podAnnotations: {}
  ## Resources for this component
  #   resources: {}
  ## Container security context for setting user ID (UID), group ID (GID) and other security policies
  #   securityContext:
  ## Ingresses rules to add for the to the component
  # ingress:
  ## Enable the creation of Ingress rules. Default is false
  #   enabled: false
  ## Annotations to add to the ingress rule
  #   annotations: {}
  ## Which Ingress class (controller) to use. Default is unspecified.
  #   ingressClassName: nginx
  ## Hosts definitions for the Ingress rule
  #   hosts:
  #     - host: demo.example.com
  ## Each host can have multiple paths/routes
  #       paths:
  #         - path: /
  #           pathType: Prefix
  #           port: 8080
  ## Optional TLS specifications for the Ingress rule
  #   tls:
  #     - secretName: demo-tls
  #       hosts:
  #         - demo.example.com
  ## Additional ingresses - only created if ingress.enabled is true
  ## Useful for when differently annotated ingress services are required
  ## Each additional ingress needs key "name" set to something unique
  #   additionalIngresses: []
  #     - name: extra-demo-ingress
  #       ingressClassName: nginx
  #       annotations: {}
  #       hosts:
  #         - host: demo.example.com
  #           paths:
  #             - path: /
  #               pathType: Prefix
  #               port: 8080
  #       tls:
  #         - secretName: demo-tls
  #           hosts:
  #             - demo.example.com
  ## Command to use in the container spec, in case you don't want to go with the default command from the image.
  #   command: []
  ## Configuration to for this component; will create a Volume, and Mount backed by an optionally created ConfigMap.
  ## The name, mountPath are required, and one of existingConfigMap or data is required.
  ## If an existing ConfigMap is not provided, the contents under data will be used for the created ConfigMap.
  #   mountedConfigMaps: []
  #     - name: my-config
  #       mountPath: /etc/config
  #       subPath:
  #       existingConfigMap: my-configmap
  #       data:
  #         my-config.yaml: |
  #           key: value
  ## Configuration to create an custom Volume
  #   additionalVolumes:
  #     - name: nginx-logs
  #       hostPath:
  #         path: /var/log/nginx
  #       type: ""
  ## Configuration to mount the custom Volume to the container
  # additionalVolumeMounts:
  #     - name: nginx-logs
  #       mountPath: /var/log/nginx
  # # Kubernetes container health check options
  #   livenessProbe: {}
  #   readinessProbe: {}
  # # Optional init container to run before the pod starts.
  #   initContainers:
  #     - name: <init-container-name>
  #       image: <init-container-image>
  #       command: [list of commands for the init container to run]
  # # Replicas for the component
  #  replicas: 1
  # # Number of old ReplicaSets to retain
  #  revisionHistoryLimit: 10
  # # Optional pod security context for setting user ID (UID), group ID (GID) and other security policies
  # # This will be applied at pod level, can be applied globally for all pods: .Values.default.podSecurityContext
  # # Or it can be applied to a specific component: .Values.components.<component-name>.podSecurityContext
  #    podSecurityContext:
  #      runAsGroup: 65534
  #      runAsNonRoot: true
  #      runAsUser: 65534

  accounting:
    enabled: true
    useDefault:
      env: true
    securityContext:
      runAsUser: 10001
      runAsGroup: 10001
    env:
      - name: KAFKA_ADDR
        value: kafka:9092
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      # SEC-05: sourced from ESO-synced Secret (see secrets-chart / docs/operations/external-secrets.md)
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: techx-corp-postgresql-app
            key: accounting-db-connection-string
      - name: OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED
        value: "false"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
      - name: otel-log-dir
        mountPath: /var/log/opentelemetry/dotnet
    initContainers:
      - name: wait-for-kafka
        image: busybox:latest
        command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]
      - name: wait-for-postgresql
        image: busybox:latest
        command: ["sh", "-c", "until nc -z -v -w30 postgresql 5432; do echo waiting for postgresql; sleep 2; done;"]

  ad:
    enabled: true
    useDefault:
      env: true
    # Tier C (JVM): see docs/operations/probe-thresholds.md
    readinessProbe:
      grpc:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    livenessProbe:
      grpc:
        port: 8080
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 5
    service:
      port: 8080
    env:
      - name: AD_PORT
        value: "8080"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: OTEL_LOGS_EXPORTER
        value: otlp
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 300Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp

  cart:
    enabled: true
    useDefault:
      env: true
    # Tier B; liveness is tcp so failedReadinessProbe chaos does not restart pods
    readinessProbe:
      grpc:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
    service:
      port: 8080
    env:
      - name: CART_PORT
        value: "8080"
      - name: ASPNETCORE_URLS
        value: http://*:$(CART_PORT)
      - name: VALKEY_ADDR
        value: valkey-cart:6379
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
    initContainers:
      - name: wait-for-valkey-cart
        image: busybox:latest
        command: ["sh", "-c", "until nc -z -v -w30 valkey-cart 6379; do echo waiting for valkey-cart; sleep 2; done;"]

  checkout:
    enabled: true
    useDefault:
      env: true
    # Tier B (Go gRPC): see docs/operations/probe-thresholds.md
    readinessProbe:
      grpc:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    livenessProbe:
      grpc:
        port: 8080
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
    service:
      port: 8080
    env:
      - name: CHECKOUT_PORT
        value: "8080"
      - name: CART_ADDR
        value: cart:8080
      - name: CURRENCY_ADDR
        value: currency:8080
      - name: EMAIL_ADDR
        value: http://email:8080
      - name: PAYMENT_ADDR
        value: payment:8080
      - name: PRODUCT_CATALOG_ADDR
        value: product-catalog:8080
      - name: SHIPPING_ADDR
        value: http://shipping:8080
      - name: KAFKA_ADDR
        value: kafka:9092
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: GOMEMLIMIT
        value: 100MiB
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    initContainers:
      - name: wait-for-kafka
        image: busybox:latest
        command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]

  currency:
    enabled: true
    useDefault:
      env: true
    # Tier A (native C++ gRPC, low CPU): see docs/operations/probe-thresholds.md
    readinessProbe:
      grpc:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      grpc:
        port: 8080
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    service:
      port: 8080
    env:
      - name: CURRENCY_PORT
        value: "8080"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: VERSION
        value: "{{ .Chart.AppVersion }}"
      - name: IPV6_ENABLED
        value: "false"
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  email:
    enabled: true
    useDefault:
      env: true
    # Tier B (no HTTP health route): tcp only
    readinessProbe:
      tcpSocket:
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
    service:
      port: 8080
    env:
      - name: EMAIL_PORT
        value: "8080"
      - name: APP_ENV
        value: production
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 200Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp

  fraud-detection:
    enabled: true
    useDefault:
      env: true
    env:
      - name: KAFKA_ADDR
        value: kafka:9092
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: OTEL_INSTRUMENTATION_KAFKA_EXPERIMENTAL_SPAN_ATTRIBUTES
        value: "true"
      - name: OTEL_INSTRUMENTATION_MESSAGING_EXPERIMENTAL_RECEIVE_TELEMETRY_ENABLED
        value: "true"
    resources:
      requests:
        cpu: 100m
        memory: 150Mi
      limits:
        cpu: 300m
        memory: 300Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
    initContainers:
      - name: wait-for-kafka
        image: busybox:latest
        command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]

  frontend:
    enabled: true
    useDefault:
      env: true
    # Stateless app → Karpenter (inherits default hard spot-tolerant contract)
    schedulingRules: *scheduling-spot-tolerant
    # Tier B† (Next.js GET / is heavier): timeout 5s; see probe-thresholds.md
    readinessProbe:
      httpGet:
        path: /
        port: 8080
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /
        port: 8080
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 4
    service:
      port: 8080
    env:
      - name: FRONTEND_PORT
        value: "8080"
      - name: PORT
        value: $(FRONTEND_PORT)
      - name: FRONTEND_ADDR
        value: :8080
      - name: AD_ADDR
        value: ad:8080
      - name: CART_ADDR
        value: cart:8080
      - name: CHECKOUT_ADDR
        value: checkout:8080
      - name: CURRENCY_ADDR
        value: currency:8080
      - name: PRODUCT_CATALOG_ADDR
        value: product-catalog:8080
      - name: PRODUCT_REVIEWS_ADDR
        value: product-reviews:3551
      - name: RECOMMENDATION_ADDR
        value: recommendation:8080
      - name: SHIPPING_ADDR
        value: http://shipping:8080
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: ENV_PLATFORM
        value: kubernetes
      - name: OTEL_COLLECTOR_HOST
        value: $(OTEL_COLLECTOR_NAME)
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4317
      - name: WEB_OTEL_SERVICE_NAME
        value: frontend-web
      - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
        value: /otlp-http/v1/traces             # This allows local development and production/ALB relative routing
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
    securityContext:
      runAsUser: 1001  # nextjs
      runAsGroup: 1001
      runAsNonRoot: true

  frontend-proxy:
    enabled: true
    useDefault:
      env: true
    # Critical ingress/gateway → Critical MNG (not the same as stateless frontend).
    # Anchor source for other critical components (no Karpenter toleration).
    # topologySpreadConstraints: [] opts out of default soft spreads (small MNG floor).
    schedulingRules: &scheduling-critical
      nodeSelector:
        workload-class: critical
      affinity: {}
      tolerations: []
      topologySpreadConstraints: []
    # Tier A: Envoy admin /ready (not data-plane / on 8080)
    readinessProbe:
      httpGet:
        path: /ready
        port: 10000
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /ready
        port: 10000
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    service:
      port: 8080
    publicAlb:
      enabled: false
      ingressClassName: alb
      scheme: internet-facing
      targetType: ip
      listenPorts: '[{"HTTP":80}]'
      host: ""
      # Storefront-only security posture on public ALB:
      #   ALLOWED (via catch-all /):  / , /api/* , /images/*
      #   BLOCKED (HTTP 403 fixed-response when blockSensitivePaths=true):
      #     /grafana, /jaeger, /loadgen, /feature, /flagservice, /otlp-http
      # Toggle: --set components.frontend-proxy.publicAlb.blockSensitivePaths=false
      # Or drive from Terraform output storefront_alb_helm_set_flags
      blockSensitivePaths: true
      blockedPrefixes:
        - /grafana
        - /jaeger
        - /loadgen
        - /feature
        - /flagservice
        - /otlp-http
    podAnnotations:
      io.opentelemetry.discovery.metrics/enabled: 'true'
      io.opentelemetry.discovery.metrics/scraper: httpcheck
      io.opentelemetry.discovery.metrics/config: |
          targets:
            - endpoint: "http://`endpoint`"
    env:
      - name: ENVOY_PORT
        value: "8080"
      - name: ENVOY_ADDR
        value: "0.0.0.0"
      - name: ENVOY_ADMIN_PORT
        value: "10000"
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: FLAGD_UI_HOST
        value: flagd
      - name: FLAGD_UI_PORT
        value: "4000"
      - name: FRONTEND_HOST
        value: frontend
      - name: FRONTEND_PORT
        value: "8080"
      - name: GRAFANA_HOST
        value: grafana
      - name: GRAFANA_PORT
        value: "80"
      - name: IMAGE_PROVIDER_HOST
        value: image-provider
      - name: IMAGE_PROVIDER_PORT
        value: "8081"
      - name: JAEGER_HOST
        value: jaeger
      - name: JAEGER_UI_PORT
        value: "16686"
      - name: LOCUST_WEB_HOST
        value: load-generator
      - name: LOCUST_WEB_PORT
        value: "8089"
      - name: OTEL_COLLECTOR_HOST
        value: $(OTEL_COLLECTOR_NAME)
      - name: OTEL_COLLECTOR_PORT_GRPC
        value: "4317"
      - name: OTEL_COLLECTOR_PORT_HTTP
        value: "4318"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 128Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
    securityContext:
      runAsUser: 101  # envoy
      runAsGroup: 101
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  image-provider:
    enabled: true
    useDefault:
      env: true
    # Tier A: nginx stub_status /status
    readinessProbe:
      httpGet:
        path: /status
        port: 8081
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /status
        port: 8081
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    service:
      port: 8081
    podAnnotations:
      io.opentelemetry.discovery.metrics/enabled: 'true'
      io.opentelemetry.discovery.metrics/scraper: nginx
      io.opentelemetry.discovery.metrics/config: |
          endpoint: "http://`endpoint`/status"
          collection_interval: "10s"
          timeout: "20s"
    env:
      - name: IMAGE_PROVIDER_PORT
        value: "8081"
      - name: OTEL_COLLECTOR_PORT_GRPC
        value: "4317"
      - name: OTEL_COLLECTOR_HOST
        value: $(OTEL_COLLECTOR_NAME)
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
    securityContext:
      runAsUser: 101  # nginx
      runAsGroup: 101
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  load-generator:
    enabled: true
    useDefault:
      env: true
    # Synthetic traffic generator — interruptible; runs on Karpenter (spot-tolerant).
    # Keep off Critical MNG so OpenSearch/Kafka/observability retain the small On-Demand floor.
    schedulingRules: *scheduling-spot-tolerant
    service:
      port: 8089
    env:
