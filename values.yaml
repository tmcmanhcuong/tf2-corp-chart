  load-generator-worker:
    enabled: true
    # HPA owns replica count when autoscaling.enabled; fixed replicas only when HPA off.
    replicas: 0
    useDefault:
      env: true
    # Same Locust image as load-generator master. ECR catalog has only "load-generator"
    # (no load-generator-worker repo). name remaps the path segment; project + tag stay global.
    imageOverride:
      name: load-generator
    # Workers on Karpenter Spot: pack onto one node first (cost), keep off storefront nodes.
    # Affinity fully replaces default; restate preferred Spot capacity-type here.
    # topologySpreadConstraints: [] opts out of default soft multi-node/AZ spreads.
    schedulingRules:
      nodeSelector:
        workload-class: spot-tolerant
      tolerations:
        - key: workload-class
          operator: Equal
          value: spot-tolerant
          effect: NoSchedule
      topologySpreadConstraints: []
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values:
                      - spot
        # Soft pack: prefer co-locating workers on the same hostname before new nodes.
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - load-generator-worker
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - frontend
                      - checkout
                      - cart
                      - recommendation
                      - product-catalog
                      - payment
                      - shipping
                      - ad
                      - email
                      - currency
                      - fraud-detection
                      - accounting
                      - image-provider
                      - quote
                      - product-reviews
              topologyKey: "kubernetes.io/hostname"
    command:
      - locust
      - --worker
      - --master-host=load-generator
      - --master-port=5557
      - --skip-log-setup
    env:
      - name: LOCUST_HOST
        value: http://frontend-proxy:8080
      - name: LOCUST_BROWSER_TRAFFIC_ENABLED
        value: "false"
      - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - name: FLAGD_HOST
        value: flagd
      - name: FLAGD_PORT
        value: "8013"
      - name: FLAGD_OFREP_PORT
        value: "8016"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: HOME
        value: /tmp
      - name: XDG_CACHE_HOME
        value: /tmp/.cache
      - name: XDG_CONFIG_HOME
        value: /tmp/.config
    resources:
      # Burstable QoS: cpu limit set to 100m for admission policy compliance
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    mountedEmptyDirs:
      - name: tmp-dir
        mountPath: /tmp
    # Fixed Worker Pool: Disable HPA to prevent scale-churn and socket disconnects during load tests.
    replicas: 10
    # Workers use soft podAffinity to co-locate on one node (podAffinity + topologySpreadConstraints: []).
    # When Karpenter consolidates that single node (WhenEmptyOrUnderutilized, consolidateAfter: 0s),
    # all 10 workers are evicted simultaneously → mass disconnect from Locust master → user drops.
    # PDB minAvailable: 9 limits Karpenter to evicting at most 1 worker at a time,
    # preventing the simultaneous eviction that causes load-test user drops.
    pdb:
      minAvailable: 9
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 20
      targetCPUUtilizationPercentage: 40
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 2
              periodSeconds: 15
            - type: Percent
              value: 100
              periodSeconds: 15
          selectPolicy: Max
        scaleDown:
          # Restored 300s / 50% per 60s after 30s/100%/15s caused 1↔2 thrash.
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
          selectPolicy: Max

