          name: flagd-config

  kafka:
    enabled: true
    stateful: true
    # Critical data plane → Critical MNG (system-*); no Karpenter toleration
    schedulingRules: *scheduling-critical
    podSecurityContext:
      fsGroup: 1000
    terminationGracePeriodSeconds: 60
    useDefault:
      env: true
    # NOTE: Singleton data/broker component. Non-surge rollout is used because it relies on single-writer / non-HA storage, which does not support zero-downtime rolling updates.
    rollout:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
    # Tier C (JVM + OTEL agent, Guaranteed 200m CPU). Without startupProbe, liveness
    # counts connection-refused during KRaft bootstrap and restarts mid-boot.
    # Unhealthy "connection refused" Events until the first successful TCP probe are expected.
    startupProbe:
      tcpSocket:
        port: 9092
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 36 # ~6.2 minutes after start (20s + 36*10s)
    readinessProbe:
      tcpSocket:
        port: 9092
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 9092
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    replicas: 1
    ports:
      - name: plaintext
        value: 9092
      - name: controller
        value: 9093
    env:
      - name: KAFKA_ADVERTISED_LISTENERS
        value: PLAINTEXT://kafka:9092
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://$(OTEL_COLLECTOR_NAME):4318
      - name: KAFKA_HEAP_OPTS
        value: "-Xmx400M -Xms400M"
      - name: KAFKA_LISTENERS
        value: PLAINTEXT://:9092,CONTROLLER://:9093
      - name: KAFKA_CONTROLLER_LISTENER_NAMES
        value: CONTROLLER
      - name: KAFKA_CONTROLLER_QUORUM_VOTERS
        value: 1@127.0.0.1:9093
      - name: KAFKA_LOG_DIRS
        value: /opt/kafka/data/kafka
    resources:
      # 50-user baseline: P99 CPU 21.6m, P99 memory 560Mi. KAFKA_HEAP_OPTS=-Xmx400M.
      requests:
        cpu: 50m
        memory: 640Mi
      limits:
        cpu: 300m
        memory: 768Mi
    securityContext:
      runAsUser: 1000 # appuser
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    volumeClaimTemplates:
      - metadata:
          name: kafka-data
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: "{{ .defaultValues.storageClassName }}"
          resources:
            requests:
              storage: 5Gi
    additionalVolumeMounts:
      - name: kafka-data
        mountPath: /opt/kafka/data

  llm:
    enabled: true
    useDefault:
