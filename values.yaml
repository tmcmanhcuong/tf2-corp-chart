    enabled: true
    imageOverride:
      repository: "ghcr.io/open-feature/flagd"
      tag: "v0.12.9"
    useDefault:
      env: true
    # Feature-flag control plane → Critical MNG
    schedulingRules: *scheduling-critical
    # Tier A (Go flagd RPC port)
    readinessProbe:
      tcpSocket:
        port: 8013
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8013
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 1
    ports:
      - name: rpc
        value: 8013
      - name: ofrep
        value: 8016
    env:
      - name: FLAGD_METRICS_EXPORTER
        value: otel
      - name: FLAGD_OTEL_COLLECTOR_URI
        value: $(OTEL_COLLECTOR_NAME):4317
      - name: GOMEMLIMIT
        value: 100MiB
    resources:
      # Burstable QoS: cpu limit set to 100m, memory limit set to 128Mi for GOMEMLIMIT safety
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    # Base: local file only (Compose / bare helm without BTC). File content is
    # local-* team keys only (see flagd/demo.flagd.json); BTC originals come from
    # prod HTTP source. Prod dual-sources live in values-prod.yaml and
    # values-flagd-sync.yaml. Keep initContainers + ConfigMap so the file path exists.
    command:
      - "/flagd-build"
      - "start"
      - "--port"
      - "8013"
      - "--ofrep-port"
      - "8016"
      - "--uri"
      - "file:./etc/flagd/demo.flagd.json"
    mountedEmptyDirs:
      - name: config-rw
        mountPath: /etc/flagd
      - name: tmp-dir
        mountPath: /tmp
    # flagd-ui as a sidecar container in the same pod so the flag json file can be shared
    sidecarContainers:
      - name: flagd-ui
