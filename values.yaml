    # NOTE: Singleton data/broker component. Non-surge rollout is used because it relies on single-writer / non-HA storage, which does not support zero-downtime rolling updates.
    rollout:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
    # Tier C (Guaranteed 100m CPU; compose uses timeout 5 / multi-retry)
    readinessProbe:
      tcpSocket:
        port: 5432
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    livenessProbe:
      tcpSocket:
