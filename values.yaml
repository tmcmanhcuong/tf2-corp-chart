  valkey-cart:
    enabled: true
    stateful: true
    schedulingRules: *scheduling-critical
    podSecurityContext:
      fsGroup: 1000
    terminationGracePeriodSeconds: 60
    useDefault:
      env: false
    # NOTE: Singleton data/broker component. Non-surge rollout is used because it relies on single-writer / non-HA storage, which does not support zero-downtime rolling updates.
    rollout:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 0
    # Tier A (fast cache bind)
    readinessProbe:
      tcpSocket:
        port: 6379
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 6379
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    imageOverride:
      repository: "valkey/valkey"
      tag: "9.0.1-alpine3.23"
    replicas: 1
    ports:
      - name: valkey-cart
        value: 6379
    podAnnotations:
      io.opentelemetry.discovery.metrics/enabled: 'true'
      io.opentelemetry.discovery.metrics/scraper: redis
      io.opentelemetry.discovery.metrics/config: |
        username: valkey
        collection_interval: 10s
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 50m
        memory: 128Mi
    securityContext:
      runAsUser: 999  # valkey
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
