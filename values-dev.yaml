# Development overlay for Argo CD / Helm GitOps (REL-09).
# Layer order: values.yaml → values-public-alb.yaml → values-dev.yaml
#
# Image contract: default.image.repository + default.image.tag is GLOBAL for all
# nested services including opensearch:
#   {{ default.image.repository }}/{{ service }}:{{ default.image.tag }}
# Before changing tag: rebuild and push ALL bake services with that tag, then verify ECR.
#
# Snapshot live tag before first Argo sync so drift is minimal.
# Secrets (SEC-05): use secretKeyRef path; deploy secrets-chart with values-dev remoteKeyPrefix first.

externalSecrets:
  enabled: true

default:
  image:
    repository: 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-dev-corp
    # Replace with currently running tag before cutover (e.g. sha-a1b2c3d).
    tag: "sha-f679cec"

components:
  # Dev cost: lower HPA floors for services expanded beyond original frontend/checkout HA.
  # frontend + checkout keep minReplicas: 2 from base (demo HA).
  cart:
    autoscaling:
      minReplicas: 1
  product-catalog:
    autoscaling:
      minReplicas: 1
  frontend-proxy:
    publicAlb:
      # Dev often leaves sensitive paths open for debugging (infra tfvars).
      blockSensitivePaths: false
    # Critical ingress/gateway (not stateless frontend). Base values.yaml pins critical.
    # flagd / frontend-proxy critical pins live in values.yaml hard-placement contract.
    # Cap Critical MNG pressure in dev; base keeps min 2 for prod-like HA.
    autoscaling:
      minReplicas: 1
