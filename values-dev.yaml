# Development overlay for Argo CD / Helm GitOps (REL-09).
# Layer order: values.yaml → values-public-alb.yaml → values-dev.yaml
#
# Image contract: default.image.tag is GLOBAL for all nested services.
# opensearch.image.tag must match default.image.tag (subchart cannot inherit parent defaults).
# Before changing tag: rebuild and push ALL bake services (including opensearch) with that tag, then verify ECR.
#
# Snapshot live tag before first Argo sync so drift is minimal.
# Secrets (SEC-05): use secretKeyRef path; deploy secrets-chart with values-dev remoteKeyPrefix first.

externalSecrets:
  enabled: true

default:
  image:
    repository: 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-dev-corp
    # Replace with currently running tag before cutover (e.g. sha-a1b2c3d).
    tag: "sha-58f4f93"

# Custom OpenSearch image from ECR (same tag as default.image.tag).
opensearch:
  image:
    repository: 493499579600.dkr.ecr.us-east-1.amazonaws.com/techx-dev-corp/opensearch
    tag: "sha-58f4f93"

components:
  frontend-proxy:
    publicAlb:
      # Dev often leaves sensitive paths open for debugging (infra tfvars).
      blockSensitivePaths: false
