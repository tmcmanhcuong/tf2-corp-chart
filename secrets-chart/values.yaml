# Separate release: helm upgrade --install techx-corp-secrets ./secrets-chart -n techx-corp-prod
# Deploy AFTER ClusterSecretStore is Ready and AFTER ASM values are bootstrapped.
# Deploy BEFORE (or wait Ready before) the main techx-corp app chart.
# Dev: -n techx-corp-dev -f values-dev.yaml (overrides namespace).

namespace: techx-corp-prod

secretStore:
  name: aws-secretsmanager
  kind: ClusterSecretStore

refreshInterval: 1h

# Prefer Orphan during migration so deleting ExternalSecret does not GC the K8s Secret.
creationPolicy: Orphan

# ASM path prefix (must match Terraform secrets_manager_name_prefix)
remoteKeyPrefix: techx-corp/production

# Target K8s Secret names consumed by the app chart (secretKeyRef)
targets:
  postgresqlAdmin: techx-corp-postgresql-admin
  postgresqlApp: techx-corp-postgresql-app
  flagdUi: techx-corp-flagd-ui
  productReviews: techx-corp-product-reviews
  grafanaAdmin: techx-corp-grafana-admin
  # SEC-06: OpenSearch security plugin credentials
  opensearch: techx-corp-opensearch
  # Directive #3: managed ElastiCache Valkey auth (prod only; see values-prod.yaml)
  valkeyCart: techx-corp-valkey-cart

# Managed cart Valkey auth token (Terraform commerce_ha module).
# Dev keeps in-cluster valkey-cart without auth — leave enabled: false.
valkeyCart:
  enabled: false
  # Full ASM secret name (not under remoteKeyPrefix). Example prod: techx-prod-tf2/valkey-cart
  remoteKey: ""
# Change trail: @hungxqt - 2026-07-15 - Add optional managed Valkey cart auth ExternalSecret.
