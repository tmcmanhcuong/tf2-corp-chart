---
# AIOps inbound Grafana webhook auth secret.
# ASM shape: {"AIOPS_GRAFANA_WEBHOOK_SECRET":"<random-secret>"}
# Bootstrap: AIOPS_GRAFANA_WEBHOOK_SECRET="$(openssl rand -hex 32)" ./scripts/bootstrap-asm-secrets.sh <prefix>
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.aiopsGrafanaWebhook }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
