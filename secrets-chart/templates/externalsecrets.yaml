    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.valkeyCart }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
  data:
    - secretKey: VALKEY_PASSWORD
      remoteRef:
        key: {{ .Values.valkeyCart.remoteKey }}
        property: password
{{- end }}
---
# Grafana Discord alert webhook (replaces kubectl create secret — SEC-05)
# ASM shape: {"webhook-url":"https://discord.com/api/webhooks/<id>/<token>"}
# Bootstrap: DISCORD_WEBHOOK_URL=<url> ./scripts/bootstrap-asm-secrets.sh <prefix>
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.grafanaDiscord }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: grafana-discord
spec:
