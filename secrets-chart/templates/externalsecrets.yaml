{{- /*
  ExternalSecrets → Kubernetes Secrets (ESO).
  ASM JSON shapes (bootstrap outside Terraform — never in TF state):

  postgresql-admin:  {"username":"...","password":"...","database":"..."}
  postgresql-app:    {"username":"...","password":"...","database":"..."}
  flagd-ui:          {"SECRET_KEY_BASE":"...","FLAGD_SYNC_TOKEN":"..."}
  product-reviews:   {"OPENAI_API_KEY":"..."}
  grafana:           {"admin-user":"...","admin-password":"..."}
  opensearch:        {"username":"...","password":"..."}
    - username: admin user for OpenSearch security plugin (ADMIN role)
    - password: admin password (alphanumeric, length ≥ 24)
    Two derived keys are rendered by ESO template:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD  → opensearch pod (bootstrap admin)
      username / password                → otel-collector HTTP basic auth

  DSN templates require alphanumeric passwords only while strings are concatenated.

  Argo CD tracking: every target uses template.engineVersion v2 so ESO does NOT
  copy ExternalSecret labels/annotations (including argocd.argoproj.io/instance
  and Helm meta) onto the generated Secret. Without a template, ESO merges ES
  metadata onto the Secret and Argo marks those Secrets OutOfSync/requiresPruning
  even though prune is false. When template is set with empty template.data,
  ESO still materializes keys from spec.data / dataFrom (MergePolicy default).
*/ -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.postgresqlAdmin }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: postgresql-admin
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.postgresqlAdmin }}
    creationPolicy: {{ .Values.creationPolicy }}
    # template present → do not inherit Argo/Helm labels onto the K8s Secret
    template:
      engineVersion: v2
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-admin
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-admin
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-admin
        property: database
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.postgresqlApp }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: postgresql-app
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.postgresqlApp }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
      data:
        username: {{ `"{{ .username }}"` }}
        password: {{ `"{{ .password }}"` }}
        database: {{ `"{{ .database }}"` }}
        {{- if and .Values.rdsPostgresql .Values.rdsPostgresql.enabled }}
        accounting-db-connection-string: {{ `"Host={{ .rds_host }};Port={{ .rds_port }};Username={{ .username }};Password={{ .password }};Database={{ .rds_database }};SSL Mode=Require"` }}
        product-catalog-db-connection-string: {{ `"postgres://{{ .username }}:{{ .password }}@{{ .rds_host }}:{{ .rds_port }}/{{ .rds_database }}?sslmode=require"` }}
        product-reviews-db-connection-string: {{ `"host={{ .rds_host }} port={{ .rds_port }} user={{ .username }} password={{ .password }} dbname={{ .rds_database }} sslmode=require"` }}
        {{- else }}
        accounting-db-connection-string: {{ `"Host=postgresql;Username={{ .username }};Password={{ .password }};Database={{ .database }}"` }}
        product-catalog-db-connection-string: {{ `"postgres://{{ .username }}:{{ .password }}@postgresql/{{ .database }}?sslmode=disable"` }}
        product-reviews-db-connection-string: {{ `"host=postgresql user={{ .username }} password={{ .password }} dbname={{ .database }}"` }}
        {{- end }}
  {{- if and .Values.rdsPostgresql .Values.rdsPostgresql.enabled .Values.rdsPostgresql.remoteKey }}
  data:
    - secretKey: rds_host
      remoteRef:
        key: {{ .Values.rdsPostgresql.remoteKey }}
        property: host
    - secretKey: rds_port
      remoteRef:
        key: {{ .Values.rdsPostgresql.remoteKey }}
        property: port
    - secretKey: rds_database
      remoteRef:
        key: {{ .Values.rdsPostgresql.remoteKey }}
        property: database
  {{- end }}
  dataFrom:
    - extract:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-app
---
