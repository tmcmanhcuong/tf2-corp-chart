spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.aiopsGrafanaWebhook }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
  data:
    - secretKey: AIOPS_GRAFANA_WEBHOOK_SECRET
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/aiops-grafana-webhook
        property: AIOPS_GRAFANA_WEBHOOK_SECRET
{{- if and .Values.msk .Values.msk.enabled .Values.msk.remoteKey .Values.msk.scramRemoteKey }}
---
# Directive #8: MSK SASL/SCRAM-over-TLS bootstrap brokers.
# ASM shape (Terraform msk module): {"brokers":"<bootstrap-brokers>"}
# Consumed by checkout, accounting, fraud-detection as KAFKA_ADDR when KAFKA_TLS=true.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.msk }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: msk
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.msk }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
  data:
    - secretKey: KAFKA_ADDR
      remoteRef:
        key: {{ .Values.msk.remoteKey }}
        property: brokers
    - secretKey: KAFKA_BROKER_0
      remoteRef:
        key: {{ .Values.msk.remoteKey }}
        property: broker0
    - secretKey: KAFKA_BROKER_1
      remoteRef:
        key: {{ .Values.msk.remoteKey }}
        property: broker1
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef:
        key: {{ .Values.msk.scramRemoteKey }}
        property: username
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef:
        key: {{ .Values.msk.scramRemoteKey }}
        property: password
{{- end }}
{{- if and .Values.mem0 .Values.mem0.enabled .Values.mem0.runtimeRemoteKey .Values.mem0.masterRemoteKey }}
---
# Mem0 runtime secret (operator-bootstrapped under ASM).
# Consumed by Deployment envFrom (GROQ_API_KEY, JWT/API keys, etc.).
# dataFrom extract keeps full JSON key set without hardcoding properties here.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.mem0Runtime }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: mem0-runtime
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.mem0Runtime }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
  dataFrom:
    - extract:
        key: {{ .Values.mem0.runtimeRemoteKey | quote }}
---
# Mem0 RDS-managed master secret for the one-shot migrate Job only.
# Maps RDS-managed keys into the env names expected by bootstrap_rds_iam.py.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.mem0RdsMaster }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: mem0-rds-master
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.mem0RdsMaster }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
      data:
        MEM0_RDS_MASTER_USERNAME: {{ `{{ .username }}` | quote }}
        MEM0_RDS_MASTER_PASSWORD: {{ `{{ .password }}` | quote }}
        MEM0_RDS_MASTER_HOST: {{ `{{ .host }}` | quote }}
        MEM0_RDS_MASTER_PORT: {{ `{{ .port }}` | quote }}
  dataFrom:
    - extract:
        key: {{ .Values.mem0.masterRemoteKey | quote }}
{{- end }}
