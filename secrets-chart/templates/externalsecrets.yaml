  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.grafanaDiscord }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
