---
# SEC-06: OpenSearch security plugin credentials
# ASM shape: {"username":"admin","password":"<strong-alphanumeric>"}
# Produces two keys consumed by different pods:
#   OPENSEARCH_INITIAL_ADMIN_PASSWORD → opensearch StatefulSet (bootstrap admin on first start)
#   username / password               → otel-collector HTTP basic auth (write-only path)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.opensearch }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: opensearch
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.opensearch }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/opensearch
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/opensearch
        property: password
    - secretKey: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/opensearch
        property: password
{{- if and .Values.valkeyCart .Values.valkeyCart.enabled .Values.valkeyCart.remoteKey }}
---
# Directive #3: ElastiCache Valkey auth token (transit encryption + AUTH).
# ASM shape (Terraform commerce_ha): {"password":"<auth-token>"}
# Consumed by cart as VALKEY_PASSWORD when VALKEY_TLS=true.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.valkeyCart }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: valkey-cart
spec:
