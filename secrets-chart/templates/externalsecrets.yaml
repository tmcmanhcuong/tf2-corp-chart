{{- /*
  ExternalSecrets → Kubernetes Secrets (ESO).
  ASM JSON shapes (bootstrap outside Terraform — never in TF state):

  postgresql-admin:  {"username":"...","password":"...","database":"..."}
  postgresql-app:    {"username":"...","password":"...","database":"..."}
  flagd-ui:          {"SECRET_KEY_BASE":"..."}
  product-reviews:   {"OPENAI_API_KEY":"..."}
  grafana:           {"admin-user":"...","admin-password":"..."}

  DSN templates require alphanumeric passwords only while strings are concatenated.
*/ -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.postgresqlAdmin }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: postgresql-admin
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.postgresqlAdmin }}
    creationPolicy: {{ .Values.creationPolicy }}
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-admin
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-admin
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-admin
        property: database
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.postgresqlApp }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: postgresql-app
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.postgresqlApp }}
    creationPolicy: {{ .Values.creationPolicy }}
    template:
      engineVersion: v2
      data:
        username: {{ `"{{ .username }}"` }}
        password: {{ `"{{ .password }}"` }}
        database: {{ `"{{ .database }}"` }}
        accounting-db-connection-string: {{ `"Host=postgresql;Username={{ .username }};Password={{ .password }};Database={{ .database }}"` }}
        product-catalog-db-connection-string: {{ `"postgres://{{ .username }}:{{ .password }}@postgresql/{{ .database }}?sslmode=disable"` }}
        product-reviews-db-connection-string: {{ `"host=postgresql user={{ .username }} password={{ .password }} dbname={{ .database }}"` }}
  dataFrom:
    - extract:
        key: {{ .Values.remoteKeyPrefix }}/postgresql-app
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.flagdUi }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: flagd-ui
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.flagdUi }}
    creationPolicy: {{ .Values.creationPolicy }}
  data:
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/flagd-ui
        property: SECRET_KEY_BASE
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.productReviews }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: product-reviews
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.productReviews }}
    creationPolicy: {{ .Values.creationPolicy }}
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/product-reviews
        property: OPENAI_API_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.targets.grafanaAdmin }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: techx-corp-secrets
    app.kubernetes.io/component: grafana-admin
spec:
  refreshInterval: {{ .Values.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind }}
  target:
    name: {{ .Values.targets.grafanaAdmin }}
    creationPolicy: {{ .Values.creationPolicy }}
  data:
    - secretKey: admin-user
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.remoteKeyPrefix }}/grafana
        property: admin-password
