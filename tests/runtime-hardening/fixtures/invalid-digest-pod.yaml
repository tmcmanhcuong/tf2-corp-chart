apiVersion: v1
kind: Pod
metadata: {name: vap-invalid-digest, namespace: default}
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: nginx@sha256:0123456789abcdef
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m, memory: 64Mi}
