apiVersion: v1
kind: Pod
metadata: {name: vap-invalid-uid-zero, namespace: default}
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 0
  containers:
    - name: app
      image: registry.k8s.io/pause:3.10
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m, memory: 64Mi}
