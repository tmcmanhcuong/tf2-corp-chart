apiVersion: batch/v1
kind: Job
metadata: {name: vap-invalid-resources, namespace: default}
spec:
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          securityContext:
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 100m}
