apiVersion: apps/v1
kind: Deployment
metadata:
  name: vap-valid-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels: {app: vap-valid-deployment}
  template:
    metadata:
      labels: {app: vap-valid-deployment}
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: app
          image: registry.k8s.io/pause:3.10
          securityContext:
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 100m, memory: 64Mi}
