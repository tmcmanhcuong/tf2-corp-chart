apiVersion: v1
kind: Pod
metadata: {name: vap-invalid-capability, namespace: default}
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: app
      image: registry.k8s.io/pause:3.10
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
          add: ["NET_ADMIN"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits: {cpu: 100m, memory: 64Mi}
