apiVersion: v1
kind: ServiceAccount
metadata:
  name: mandate17-attacker
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandate17-attacker
  labels:
    app.kubernetes.io/name: mandate17-attacker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mandate17-attacker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mandate17-attacker
    spec:
      serviceAccountName: mandate17-attacker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: attacker
          image: curlimages/curl:8.14.1@sha256:9a1ed35addb45476afa911696297f8e115993df459278ed036182dd2cd22b67b
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
