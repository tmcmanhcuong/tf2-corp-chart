#
# Pod & Node Health Alert Rules
#
# Covers:
#   1.  PodCrashLooping        — non-hot-path pod restart >3 lần/15m
#   2.  PodOOMKilled           — container bị kill do OOM
#   3.  PodRestartingFrequently — restart >10 lần/1h (early warning, non-hot-path)
#   4.  PodNotReady            — pod không Ready >5m, không đang restart
#   5.  PodStuckPending        — pod stuck Pending >10m
#   6.  PodFailed              — phase=Failed
#   7.  ContainerWaitingError  — ImagePullBackOff / ErrImagePull / ...
#   8.  NodeMemoryPressure
#   9.  NodeDiskPressure
#   10. NodeNotReady           — node không Ready >5m
#
# NOTE: Hot path pods (frontend, cart, checkout, ...) được cover riêng
#       trong hot-path-slo-alerting.yaml với ngưỡng chặt hơn.
---
apiVersion: 1

groups:
  - orgId: 1
    name: pod-health
    folder: platform
    interval: 1m
    rules:

      # ------------------------------------------------------------------ #
      # 1. CrashLoopBackOff — non-hot-path pod restart >3 lần/15m          #
      #    Hot path pods được cover bởi HotPathPodRestarting (5m window)   #
      # ------------------------------------------------------------------ #
      - uid: pod-crash-loop-001
        title: PodCrashLooping
        condition: threshold
        data:
          - refId: restarts
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                increase(
                  kube_pod_container_status_restarts_total{
                    namespace="techx-corp-prod",
                    pod!~"(frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping)-.*"
                  }[15m]
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: restarts
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: restarts
              conditions:
                - evaluator:
                    type: gt
                    params: [3]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 2m
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} đang CrashLoop"
          description: >-
            Container <b>{{ $labels.container }}</b> trong pod
            <b>{{ $labels.namespace }}/{{ $labels.pod }}</b>
            đã restart {{ $values.restarts.Value | printf "%.0f" }} lần trong 15 phút.
            Kiểm tra: kubectl logs {{ $labels.pod }} -n {{ $labels.namespace }} --previous
          discord_description: >-
            Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
            restarted {{ $values.restarts.Value | printf "%.0f" }} times in 15 minutes.
          impact: >-
            The workload is unstable and can lose capacity or fail requests if it backs a live service.
          action: >-
            Run kubectl describe pod, kubectl logs --previous, and inspect recent rollout, image, config,
            secret, and dependency errors before restarting or scaling.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/probe-thresholds.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}"'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: pod_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 2. OOMKilled — container bị kernel kill do vượt memory limit        #
      # ------------------------------------------------------------------ #
      - uid: pod-oomkilled-002
        title: PodOOMKilled
        condition: threshold
        data:
          - refId: oom_events
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                increase(
                  kube_pod_container_status_last_terminated_reason{
                    namespace="techx-corp-prod",
                    reason="OOMKilled"
                  }[10m]
                ) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: oom_events
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: oom_events
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 0s
        keepFiringFor: 5m
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} bị OOMKilled"
          description: >-
            Container <b>{{ $labels.container }}</b> trong pod
            <b>{{ $labels.namespace }}/{{ $labels.pod }}</b>
            vừa bị OOMKilled (kernel kill do vượt memory limit).
            Xem xét tăng <code>resources.limits.memory</code>.
          discord_description: >-
            Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
            was OOMKilled after exceeding its memory limit.
          impact: >-
            The service can restart, drop in-flight requests, and trigger user-visible failures or retries.
          action: >-
            Check the K8s pod troubleshooting dashboard, run kubectl logs --previous, compare memory usage
            with requests/limits, then decide whether to tune code, HPA, or memory limits.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/backlogs/2026-07-10-rel-06-resource-requests-limits.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}" AND body:*OOM*'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: pod_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 3. Restart nhiều — non-hot-path, >10 lần/1h (early warning)        #
      #    Ngưỡng 10 để tránh overlap với PodCrashLooping (>3/15m)         #
      # ------------------------------------------------------------------ #
      - uid: pod-restart-freq-003
        title: PodRestartingFrequently
        condition: threshold
        data:
          - refId: restarts_1h
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                increase(
                  kube_pod_container_status_restarts_total{
                    namespace="techx-corp-prod",
                    pod!~"(frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping)-.*"
                  }[1h]
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: restarts_1h
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: restarts_1h
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 0s
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restart liên tục"
          description: >-
            Container <b>{{ $labels.container }}</b> trong pod
            <b>{{ $labels.namespace }}/{{ $labels.pod }}</b>
            đã restart <b>{{ $values.restarts_1h.Value | printf "%.0f" }}</b> lần trong 1 giờ qua.
          discord_description: >-
            Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
            restarted {{ $values.restarts_1h.Value | printf "%.0f" }} times in the last hour.
          impact: >-
            Repeated restarts indicate instability and can become a customer-impacting outage if traffic rises.
          action: >-
            Check previous logs, pod events, probes, resource pressure, and recent deployment changes.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/probe-thresholds.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}"'
        labels:
          severity: warning
          team: cdo06
          domain: reliability
          environment: production
          alert_type: pod_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 4. Pod Not Ready >5m — loại trừ pod đang trong quá trình restart    #
      #    Dùng max_over_time để aggregate container-level restart về pod   #
      #    level trước khi join, tránh cardinality mismatch với unless      #
      # ------------------------------------------------------------------ #
      - uid: pod-not-ready-004
        title: PodNotReady
        condition: threshold
        data:
          - refId: not_ready
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_pod_status_ready{
                  namespace="techx-corp-prod",
                  condition="true"
                } == 0
                unless on(namespace, pod)
                (
                  max by (namespace, pod) (
                    increase(
                      kube_pod_container_status_restarts_total{
                        namespace="techx-corp-prod"
                      }[5m]
                    )
                  ) > 0
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: not_ready
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: not_ready
              conditions:
                - evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 2m
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} không Ready"
          description: >-
            Pod <b>{{ $labels.namespace }}/{{ $labels.pod }}</b>
            không ở trạng thái Ready hơn 5 phút (và không phải do đang restart).
            Kiểm tra: kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }}
          discord_description: >-
            Pod {{ $labels.namespace }}/{{ $labels.pod }} has been NotReady for more than 5 minutes.
          impact: >-
            The pod is not serving traffic; replica shortage can reduce capacity or availability.
          action: >-
            Run kubectl describe pod, check readiness probe failures, endpoints, resource pressure, and dependencies.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/probe-thresholds.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}"'
        labels:
          severity: warning
          team: cdo06
          domain: reliability
          environment: production
          alert_type: pod_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 5. Pod Pending >10m                                                  #
      # ------------------------------------------------------------------ #
      - uid: pod-pending-005
        title: PodStuckPending
        condition: threshold
        data:
          - refId: pending
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_pod_status_phase{
                  namespace="techx-corp-prod",
                  phase="Pending"
                } == 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: pending
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: pending
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 10m
        keepFiringFor: 2m
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck Pending"
          description: >-
            Pod <b>{{ $labels.namespace }}/{{ $labels.pod }}</b>
            vẫn ở trạng thái <b>Pending</b> hơn 10 phút.
            Nguyên nhân thường gặp: node selector không match, PVC chưa bound, resource quota.
            Kiểm tra: kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }}
          discord_description: >-
            Pod {{ $labels.namespace }}/{{ $labels.pod }} has been Pending for more than 10 minutes.
          impact: >-
            New replicas are not starting, so HPA scale-out can fail and latency can increase under load.
          action: >-
            Inspect pod events, node selectors, taints, PVCs, requests, quotas, and Karpenter capacity before changing topology.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/autoscaling-validation.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}"'
        labels:
          severity: warning
          team: cdo03
          domain: performance
          environment: production
          alert_type: scheduling
        isPaused: false

      # ------------------------------------------------------------------ #
      # 6. Pod Failed                                                        #
      # ------------------------------------------------------------------ #
      - uid: pod-failed-006
        title: PodFailed
        condition: threshold
        data:
          - refId: failed
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_pod_status_phase{
                  namespace="techx-corp-prod",
                  phase="Failed"
                } == 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: failed
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: failed
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 1m
        keepFiringFor: 5m
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} ở trạng thái Failed"
          description: >-
            Pod <b>{{ $labels.namespace }}/{{ $labels.pod }}</b> đã vào phase <b>Failed</b>.
            Kiểm tra: kubectl logs {{ $labels.pod }} -n {{ $labels.namespace }} --previous
          discord_description: >-
            Pod {{ $labels.namespace }}/{{ $labels.pod }} entered Failed phase.
          impact: >-
            The workload may have lost capacity or left a failed job/pod that needs investigation.
          action: >-
            Run kubectl describe pod and kubectl logs --previous, then check image, command, config, and dependency errors.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/probe-thresholds.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}"'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: pod_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 7. Container Waiting Error                                           #
      # ------------------------------------------------------------------ #
      - uid: container-waiting-007
        title: ContainerWaitingError
        condition: threshold
        data:
          - refId: waiting_error
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_pod_container_status_waiting_reason{
                  namespace="techx-corp-prod",
                  reason=~"ImagePullBackOff|ErrImagePull|CreateContainerConfigError|InvalidImageName|CreateContainerError"
                } == 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: waiting_error
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: waiting_error
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 3m
        keepFiringFor: 5m
        annotations:
          summary: "Container {{ $labels.pod }}/{{ $labels.container }} lỗi khởi động"
          description: >-
            Container <b>{{ $labels.container }}</b> trong pod
            <b>{{ $labels.namespace }}/{{ $labels.pod }}</b>
            đang stuck với lý do: <b>{{ $labels.reason }}</b>.
          discord_description: >-
            Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }}
            is waiting with reason {{ $labels.reason }}.
          impact: >-
            The pod cannot start and can block rollout, scale-out, or service recovery.
          action: >-
            Check image tag/digest, registry access, secret/config references, and container command before forcing rollout.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/runtime-hardening.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}"'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: pod_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 8. Node Memory Pressure                                              #
      # ------------------------------------------------------------------ #
      - uid: node-memory-pressure-008
        title: NodeMemoryPressure
        condition: threshold
        data:
          - refId: mem_pressure
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_node_status_condition{
                  condition="MemoryPressure",
                  status="true"
                } == 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: mem_pressure
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: mem_pressure
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 2m
        keepFiringFor: 5m
        annotations:
          summary: "Node {{ $labels.node }} đang Memory Pressure"
          description: >-
            Node <b>{{ $labels.node }}</b> đang trong trạng thái <b>MemoryPressure</b>.
            Kubelet có thể bắt đầu evict pod.
            Kiểm tra: kubectl describe node {{ $labels.node }}
          discord_description: >-
            Node {{ $labels.node }} is under MemoryPressure and may evict pods.
          impact: >-
            Pods can be evicted or throttled, reducing capacity and increasing latency or errors.
          action: >-
            Check node allocatable versus pod requests, top memory consumers, recent scale-in, and Karpenter node availability.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/autoscaling-validation.md"
          logs_hint: 'k8s.node.name="{{ $labels.node }}"'
        labels:
          severity: critical
          team: cdo03
          domain: cost
          environment: production
          alert_type: node_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 9. Node Disk Pressure                                                #
      # ------------------------------------------------------------------ #
      - uid: node-disk-pressure-009
        title: NodeDiskPressure
        condition: threshold
        data:
          - refId: disk_pressure
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_node_status_condition{
                  condition="DiskPressure",
                  status="true"
                } == 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: disk_pressure
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: disk_pressure
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 2m
        keepFiringFor: 5m
        annotations:
          summary: "Node {{ $labels.node }} đang Disk Pressure"
          description: >-
            Node <b>{{ $labels.node }}</b> đang trong trạng thái <b>DiskPressure</b>.
            Container runtime có thể bị ảnh hưởng. Kiểm tra disk usage trên node.
          discord_description: >-
            Node {{ $labels.node }} is under DiskPressure and container runtime may be affected.
          impact: >-
            Pods can be evicted, image pulls can fail, and rollout stability can degrade.
          action: >-
            Inspect node disk usage, image garbage collection, pod ephemeral storage, and recent rollout activity.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/runtime-hardening.md"
          logs_hint: 'k8s.node.name="{{ $labels.node }}"'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: node_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 10. Node Not Ready >5m                                               #
      # ------------------------------------------------------------------ #
      - uid: node-not-ready-010
        title: NodeNotReady
        condition: threshold
        data:
          - refId: node_not_ready
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_node_status_condition{
                  condition="Ready",
                  status="true"
                } == 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: node_not_ready
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: node_not_ready
              conditions:
                - evaluator:
                    type: gt
                    params: [-1]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 5m
        annotations:
          summary: "Node {{ $labels.node }} không Ready"
          description: >-
            Node <b>{{ $labels.node }}</b> không ở trạng thái <b>Ready</b> hơn 5 phút.
            Tất cả pod trên node này có thể bị ảnh hưởng.
            Kiểm tra: kubectl describe node {{ $labels.node }}
          discord_description: >-
            Node {{ $labels.node }} has been NotReady for more than 5 minutes.
          impact: >-
            All pods on the node can lose availability until Kubernetes reschedules them.
          action: >-
            Check node conditions, kubelet, CNI, AZ health, Karpenter or managed node group status, then verify pod rescheduling.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/workload-placement.md"
          logs_hint: 'k8s.node.name="{{ $labels.node }}"'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: node_health
        isPaused: false

      # ------------------------------------------------------------------ #
      # 11. Pod Evicted — bị kubelet evict do node pressure                 #
      # ------------------------------------------------------------------ #
      - uid: pod-evicted-011
        title: PodEvicted
        condition: threshold
        data:
          - refId: evicted
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                kube_pod_status_reason{
                  namespace="techx-corp-prod",
                  reason="Evicted"
                } == 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: evicted
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: evicted
              conditions:
                - evaluator:
