#
# Hot Path Service SLO Alert Rules
#
# Metric source: traces_span_metrics_duration_milliseconds_* (spanmetrics / OTel Collector)
# Datasource   : webstore-metrics (Prometheus uid)
# Namespace    : techx-corp-prod
#
# Thresholds:
#   Error rate  > 1%     (5m window)  → warning  [guard: traffic > 1 rps]
#   P95 latency > 1000ms (5m window)  → warning
#   Pod restart > 3      (5m window)  → critical
#
# Hot path services:
#   frontend, frontend-proxy, cart, checkout, currency,
#   product-catalog, product-reviews, quote, recommendation, shipping
---
apiVersion: 1

groups:
  - orgId: 1
    name: hot-path-slo
    folder: platform
    interval: 1m
    rules:

      # ------------------------------------------------------------------ #
      # 1. Error Rate > 1%                                                   #
      #    Dùng Math expression để combine traffic guard + error rate:       #
      #    chỉ fire khi total_rate > 1 rps VÀ error_rate > 1%              #
      # ------------------------------------------------------------------ #
      - uid: hotpath-error-rate-001
        title: HotPathHighErrorRate
        condition: combined
        data:
          - refId: total_rate
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                sum by (service_name) (
                  rate(
                    traces_span_metrics_duration_milliseconds_count{
                      service_name=~"frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping"
                    }[5m]
                  )
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: total_rate
          - refId: error_rate
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                100
                *
                sum by (service_name) (
                  rate(
                    traces_span_metrics_duration_milliseconds_count{
                      service_name=~"frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping",
                      status_code="STATUS_CODE_ERROR"
                    }[5m]
                  )
                )
                /
                clamp_min(
                  sum by (service_name) (
                    rate(
                      traces_span_metrics_duration_milliseconds_count{
                        service_name=~"frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping"
                      }[5m]
                    )
                  ),
                  0.001
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: error_rate
          # Math: fire chỉ khi CẢ HAI điều kiện đều true (value > 0)
          # total_rate > 1  →  (total_rate - 1) > 0
          # error_rate > 1% →  (error_rate - 1) > 0
          # combined = (total_rate - 1) * (error_rate - 1): dương khi cả 2 vượt ngưỡng
          - refId: combined
            datasourceUid: __expr__
            model:
              type: math
              refId: combined
              expression: "($total_rate > 1) * ($error_rate > 1)"
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: combined
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 2m
        keepFiringFor: 2m
        annotations:
          summary: "{{ $labels.service_name }} error rate > 1%"
          description: >-
            Service <b>{{ $labels.service_name }}</b> error rate:
            <b>{{ $values.error_rate.Value | printf "%.2f" }}%</b> (ngưỡng: 1%, window: 5m).
          discord_description: >-
            Service {{ $labels.service_name }} error rate is {{ $values.error_rate.Value | printf "%.2f" }}%
            (threshold: 1%, window: 5m, for: 2m).
          impact: >-
            User-visible flows can fail, especially cart, checkout, payment, product lookup, or shipping calls.
          action: >-
            Open the Webstore SLO dashboard, check the affected service error panel, then inspect Jaeger traces
            and OpenSearch logs for the same service before changing code or scaling.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/febljk0a32qyoa?orgId=1&var-deployment_environment_name=production&var-service_namespace=techx-corp-prod&var-service_name={{ $labels.service_name }}"
          slo_dashboard_url: "https://internal.hungtran.id.vn/grafana/d/webstore-perf-slo-res?orgId=1"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/request-metric-hpa.md"
          logs_hint: 'service.name="{{ $labels.service_name }}" AND severity.text>=ERROR'
          trace_hint: 'service={{ $labels.service_name }}'
        labels:
          severity: warning
          team: cdo03
          domain: performance
          environment: production
          alert_type: error_rate
        isPaused: false
        notification_settings:
          receiver: discord-alerts

      # ------------------------------------------------------------------ #
      # 2. P95 Latency > 1000ms                                             #
      # ------------------------------------------------------------------ #
      - uid: hotpath-p95-latency-002
        title: HotPathHighP95Latency
        condition: latency_guard
        data:
          - refId: p95_ms
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                histogram_quantile(
                  0.95,
                  sum by (service_name, le) (
                    rate(
                      traces_span_metrics_duration_milliseconds_bucket{
                        service_name=~"frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping"
                      }[5m]
                    )
                  )
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: p95_ms
          - refId: p95_traffic_rate
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                sum by (service_name) (
                  rate(
                    traces_span_metrics_duration_milliseconds_count{
                      service_name=~"frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping"
                    }[5m]
                  )
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: p95_traffic_rate
          - refId: latency_guard
            datasourceUid: __expr__
            model:
              type: math
              refId: latency_guard
              expression: "($p95_traffic_rate > 1) * ($p95_ms > 1000)"
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: latency_guard
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 2m
        keepFiringFor: 2m
        annotations:
          summary: "{{ $labels.service_name }} P95 latency > 1s"
          description: >-
            Service <b>{{ $labels.service_name }}</b> P95 latency:
            <b>{{ $values.p95_ms.Value | printf "%.0f" }}ms</b> (ngưỡng: 1000ms, window: 5m).
          discord_description: >-
            Service {{ $labels.service_name }} P95 latency is {{ $values.p95_ms.Value | printf "%.0f" }}ms
            (threshold: 1000ms, window: 5m, for: 2m).
          impact: >-
            Users can experience slow page load, cart update, recommendation, shipping quote, or checkout flow.
          action: >-
            Open the service-scoped APM dashboard, confirm traffic volume, inspect Jaeger traces for the affected
            service, then compare pod CPU/memory and recent rollout state.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/febljk0a32qyoa?orgId=1&var-deployment_environment_name=production&var-service_namespace=techx-corp-prod&var-service_name={{ $labels.service_name }}"
          slo_dashboard_url: "https://internal.hungtran.id.vn/grafana/d/webstore-perf-slo-res?orgId=1"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/request-metric-hpa.md"
          logs_hint: 'service.name="{{ $labels.service_name }}" AND severity.text>=WARN'
          trace_hint: 'service={{ $labels.service_name }}'
        labels:
          severity: warning
          team: cdo03
          domain: performance
          environment: production
          alert_type: latency
        isPaused: false
        notification_settings:
          receiver: discord-alerts

      # ------------------------------------------------------------------ #
      # 3. Pod Restart > 3 lần / 5 phút — hot path pods only               #
      #    for: 1m để tránh false positive từ increase() lúc pod mới start  #
      # ------------------------------------------------------------------ #
      - uid: hotpath-pod-restart-003
        title: HotPathPodRestarting
        condition: threshold
        data:
          - refId: restarts_5m
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                increase(
                  kube_pod_container_status_restarts_total{
                    namespace="techx-corp-prod",
                    pod=~"(frontend|frontend-proxy|cart|checkout|currency|product-catalog|product-reviews|quote|recommendation|shipping)-.*"
                  }[5m]
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: restarts_5m
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: restarts_5m
              conditions:
                - evaluator:
                    type: gt
                    params: [3]
                  operator:
                    type: and
                  query:
                    params: [threshold]
                  reducer:
                    type: last
                    params: []
        noDataState: OK
        execErrState: Error
        for: 1m
        keepFiringFor: 5m
        annotations:
          summary: "Hot path pod {{ $labels.pod }} restart > 3 lần/5m"
          description: >-
            Pod <b>{{ $labels.namespace }}/{{ $labels.pod }}</b>
            (container: <b>{{ $labels.container }}</b>) đã restart
            <b>{{ $values.restarts_5m.Value | printf "%.0f" }}</b> lần trong 5 phút.
            Service này thuộc hot path — cần xử lý ngay.
          discord_description: >-
            Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }}
            restarted {{ $values.restarts_5m.Value | printf "%.0f" }} times in 5 minutes.
          impact: >-
            Repeated restarts can drop in-flight requests and reduce capacity for user-facing paths.
          action: >-
            Run kubectl describe pod and kubectl logs --previous for the pod, then check the K8s pod
            troubleshooting dashboard before changing requests, limits, or rollout state.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/probe-thresholds.md"
          logs_hint: 'k8s.pod.name="{{ $labels.pod }}"'
          trace_hint: 'service={{ $labels.container }}'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: restart
        isPaused: false
        notification_settings:
          receiver: discord-alerts
