#
# Grafana provisioning — Notification Policies
#
# Routing:
#   - hot path alerts (alert_type label) → group by service_name + alert_type
#   - severity=critical  → repeat mỗi 30 phút
#   - severity=warning   → repeat mỗi 1 giờ
#   - default fallback   → discord-alerts, repeat 4h
---
apiVersion: 1

policies:
  - orgId: 1
    receiver: discord-alerts
    group_by:
      - environment
      - namespace
      - alertname
      - alert_type
      - severity
      - team
      - domain
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: discord-alerts
        matchers:
          - alert_type =~ "error_rate|latency|restart"
        group_by:
          - environment
          - namespace
          - alertname
          - service_name
          - pod
          - container
          - alert_type
          - severity
          - team
          - domain
        group_wait: 30s
        group_interval: 2m
        repeat_interval: 30m
        continue: false

      - receiver: discord-alerts
        matchers:
          - alert_type = runtime_security
        group_by:
          - environment
          - namespace
          - alertname
          - alert_type
          - severity
          - team
          - domain
          - job_name
          - cronjob
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 30m
        continue: false

      - receiver: discord-alerts
        matchers:
          - alert_type =~ "pod_health|node_health|scheduling|capacity|karpenter_health"
        group_by:
          - environment
          - namespace
          - alertname
          - alert_type
          - severity
          - team
          - domain
          - service_name
          - pod
          - container
          - node
          - nodepool
          - resource
          - resource_type
          - reason
          - label_topology_kubernetes_io_zone
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
        continue: false

      - receiver: discord-alerts
        matchers:
          - severity = critical
        group_by:
          - environment
          - namespace
          - alertname
          - alert_type
          - severity
          - team
          - domain
          - service_name
          - pod
          - node
          - resource
          - reason
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 30m
        continue: false

      - receiver: discord-alerts
        matchers:
          - severity = warning
        group_by:
          - environment
          - namespace
          - alertname
          - alert_type
          - severity
          - team
          - domain
          - service_name
          - pod
          - node
          - resource
          - reason
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
        continue: false
