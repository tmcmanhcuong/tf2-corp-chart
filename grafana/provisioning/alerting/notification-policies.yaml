#
# Grafana provisioning — Notification Policies
#
# Routing:
#   - severity=critical  → telegram-alerts, repeat mỗi 30 phút
#   - severity=warning   → telegram-alerts, repeat mỗi 1 giờ
#   - default fallback   → telegram-alerts
---
apiVersion: 1

policies:
  - orgId: 1
    receiver: telegram-alerts
    group_by:
      - namespace
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: telegram-alerts
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 30m
        continue: false

      - receiver: telegram-alerts
        matchers:
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
        continue: false
