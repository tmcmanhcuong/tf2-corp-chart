---
apiVersion: 1

groups:
  - orgId: 1
    name: karpenter-capacity
    folder: platform
    interval: 1m
    rules:
      - uid: karpenter-unschedulable-001
        title: KarpenterUnschedulablePods
        condition: threshold
        data:
          - refId: pending
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: 'karpenter_scheduler_unschedulable_pods_count{controller="provisioner"} > 0'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: pending
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: pending
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {type: last, params: []}
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 5m
        annotations:
          summary: Karpenter cannot schedule one or more pods
          description: Inspect Pending pod events, NodePool limits, eligible instance categories, topology constraints, and Spot fallback health.
          discord_description: >-
            Karpenter reports one or more unschedulable pods after evaluating current NodePool capacity
            and scheduling constraints.
          impact: >-
            New replicas may not start, so traffic spikes can turn into higher latency or failed requests.
          action: >-
            Check Pending pod events, NodePool limits, eligible instance types, topology spread constraints,
            taints, tolerations, and Spot fallback capacity before relaxing placement rules.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/autoscaling-validation.md"
          logs_hint: 'app.kubernetes.io/name="karpenter" AND severity.text>=WARN'
        labels:
          severity: warning
          team: cdo03
          domain: performance
          environment: production
          alert_type: scheduling
        isPaused: false

      - uid: karpenter-capacity-high-002
        title: KarpenterNodePoolCapacityHigh
        condition: threshold
        data:
          - refId: utilization
            relativeTimeRange: {from: 1800, to: 0}
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                (
                  karpenter_nodepools_usage{resource_type=~"cpu|memory"}
                  / on(nodepool, resource_type)
                  karpenter_nodepools_limit{resource_type=~"cpu|memory"}
                ) > 0.80
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: utilization
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: utilization
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {type: last, params: []}
        noDataState: OK
        execErrState: Error
        for: 10m
        keepFiringFor: 5m
        annotations:
          summary: Karpenter NodePool exceeds 80 percent of its configured limit
          description: Review the affected nodepool and resource_type before raising limits; validate the workload request model and cost impact first.
          discord_description: >-
            A Karpenter NodePool is using more than 80 percent of its configured CPU or memory limit.
          impact: >-
            The cluster is close to a capacity ceiling; scale-out can fail or require a cost-impacting limit increase.
          action: >-
            Review the affected nodepool and resource_type, compare real usage versus requests, then validate
            whether to tune requests, move workloads, or raise limits with cost approval.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/autoscaling-validation.md"
          logs_hint: 'app.kubernetes.io/name="karpenter"'
        labels:
          severity: warning
          team: cdo03
          domain: cost
          environment: production
          alert_type: capacity
        isPaused: false

      - uid: karpenter-state-sync-003
        title: KarpenterClusterStateNotSynced
        condition: threshold
        data:
          - refId: sync_state
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: 'karpenter_cluster_state_synced == bool 0'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: sync_state
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: sync_state
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {type: last, params: []}
        noDataState: Alerting
        execErrState: Error
        for: 5m
        keepFiringFor: 5m
        annotations:
          summary: Karpenter cluster-state synchronization is unhealthy
          description: Check the controller deployment, Kubernetes API access, interruption queue, and controller logs without printing credentials.
          discord_description: >-
            Karpenter cluster-state synchronization is unhealthy for more than 5 minutes.
          impact: >-
            Autoscaling decisions can be delayed or incorrect, increasing the risk of unscheduled pods or unstable recovery.
          action: >-
            Check Karpenter controller pods, Kubernetes API access, interruption queue, controller logs,
            and recent Helm/Terraform changes without exposing credentials.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/autoscaling-validation.md"
          logs_hint: 'app.kubernetes.io/name="karpenter" AND severity.text>=ERROR'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: karpenter_health
        isPaused: false

      - uid: production-unschedulable-warning-004
        title: ProductionPodsUnschedulableWarning
        condition: threshold
        data:
          - refId: unschedulable
            relativeTimeRange: {from: 900, to: 0}
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: 'sum(kube_pod_status_unschedulable{namespace="techx-corp-prod"}) > 0'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: unschedulable
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: unschedulable
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {type: last, params: []}
        noDataState: OK
        execErrState: Error
        for: 5m
        keepFiringFor: 5m
        annotations:
          summary: Production pods have been unschedulable for five minutes
          description: Check pod events for topology, taint, PDB, resource, NodePool-limit, or instance-capacity constraints.
          discord_description: >-
            One or more production pods in techx-corp-prod have been unschedulable for 5 minutes.
          impact: >-
            New replicas cannot start, so deployment, recovery, or HPA scale-out can be delayed.
          action: >-
            Check pod events for topology, taint, PDB, resource request, NodePool limit,
            quota, and instance-capacity constraints.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/workload-placement.md"
          logs_hint: 'k8s.namespace.name="techx-corp-prod" AND reason="FailedScheduling"'
        labels:
          severity: warning
          team: cdo03
          domain: performance
          environment: production
          alert_type: scheduling
        isPaused: false

      - uid: production-unschedulable-critical-005
        title: ProductionPodsUnschedulableCritical
        condition: threshold
        data:
          - refId: unschedulable
            relativeTimeRange: {from: 1800, to: 0}
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: 'sum(kube_pod_status_unschedulable{namespace="techx-corp-prod"}) > 0'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: unschedulable
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: unschedulable
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {type: last, params: []}
        noDataState: OK
        execErrState: Error
        for: 15m
        keepFiringFor: 10m
        annotations:
          summary: Production pods remain unschedulable for fifteen minutes
          description: Escalate to the platform operator; preserve hard production spread unless an approved incident procedure explicitly changes it.
          discord_description: >-
            Production pods in techx-corp-prod remain unschedulable for 15 minutes.
          impact: >-
            The application can lose availability or remain under-capacity during incident recovery or rollout.
          action: >-
            Escalate to the platform operator, preserve hard production spread unless an approved incident
            procedure changes it, and capture pod events plus NodePool status for the incident timeline.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/workload-placement.md"
          logs_hint: 'k8s.namespace.name="techx-corp-prod" AND reason="FailedScheduling"'
        labels:
          severity: critical
          team: cdo06
          domain: reliability
          environment: production
          alert_type: scheduling
        isPaused: false

      - uid: critical-headroom-006
        title: CriticalNodeResourceHeadroomLow
        condition: threshold
        data:
          - refId: request_ratio
            relativeTimeRange: {from: 1800, to: 0}
            datasourceUid: webstore-metrics
            model:
              editorMode: code
              expr: |
                (
                  sum by (node, resource, unit) (
                    kube_pod_container_resource_requests{resource=~"cpu|memory"}
                    * on(node) group_left()
                    kube_node_labels{label_workload_class="critical"}
                  )
                  /
                  sum by (node, resource, unit) (
                    kube_node_status_allocatable{resource=~"cpu|memory"}
                    * on(node) group_left()
                    kube_node_labels{label_workload_class="critical"}
                  )
                ) > 0.75
                or
                (
                  sum by (label_topology_kubernetes_io_zone, resource, unit) (
                    kube_pod_container_resource_requests{resource=~"cpu|memory"}
                    * on(node) group_left(label_topology_kubernetes_io_zone)
                    kube_node_labels{
                      label_workload_class="critical",
                      label_topology_kubernetes_io_zone!=""
                    }
                  )
                  /
                  sum by (label_topology_kubernetes_io_zone, resource, unit) (
                    kube_node_status_allocatable{resource=~"cpu|memory"}
                    * on(node) group_left(label_topology_kubernetes_io_zone)
                    kube_node_labels{
                      label_workload_class="critical",
                      label_topology_kubernetes_io_zone!=""
                    }
                  )
                ) > 0.75
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: request_ratio
          - refId: threshold
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: request_ratio
              conditions:
                - evaluator: {type: gt, params: [0]}
                  operator: {type: and}
                  query: {params: [threshold]}
                  reducer: {type: last, params: []}
        noDataState: Alerting
        execErrState: Error
        for: 10m
        keepFiringFor: 5m
        annotations:
          summary: Critical managed-node requested resource headroom is below 25 percent
          description: Review the affected CPU or memory request ratio per node and Availability Zone before scheduling or infrastructure changes.
          discord_description: >-
            Critical managed-node CPU or memory request headroom is below 25 percent by node or Availability Zone.
          impact: >-
            Critical workloads have limited failover headroom; a rollout, node drain, or AZ issue can cause scheduling pressure.
          action: >-
            Review the affected CPU or memory request ratio by node and AZ, compare real usage against requests,
            then tune workload requests or capacity with cost and reliability approval.
          dashboard_url: "https://internal.hungtran.id.vn/grafana/d/k8s-pod-troubleshooting"
          runbook_url: "https://github.com/tf2-team/tf2-corp-chart/blob/main/docs/operations/autoscaling-validation.md"
          logs_hint: 'k8s.node.name="{{ $labels.node }}"'
        labels:
          severity: warning
          team: cdo03
          domain: cost
          environment: production
          alert_type: capacity
        isPaused: false

# Change trail: @hungxqt - 2026-07-15 - Add Karpenter, Pending-pod, and critical-capacity alerts.
