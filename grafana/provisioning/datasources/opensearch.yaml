apiVersion: 1

datasources:
  - name: OpenSearch
    uid: webstore-logs
    type: grafana-opensearch-datasource
    url: http://opensearch:9200/
    access: proxy
    # SEC-02: provisioned datasource is non-editable to prevent accidental edits
    editable: false
    isDefault: false
    jsonData:
      database: otel-logs-*
      flavor: opensearch
      logLevelField: severity.text.keyword
      logMessageField: body
      pplEnabled: true
      timeField: observedTimestamp
      version: 3.6.0
