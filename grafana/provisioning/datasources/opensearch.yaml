apiVersion: 1

datasources:
  - name: OpenSearch
    uid: webstore-logs
    type: grafana-opensearch-datasource
    url: http://opensearch:9200/
    access: proxy
    # SEC-02: provisioned datasource is non-editable to prevent accidental edits
    editable: false
    isDefault: false
    # SEC-06: basic auth for OpenSearch security plugin.
    # Credentials are injected by Grafana from the K8s Secret techx-corp-opensearch
    # via grafana.envValueFrom (see values.yaml grafana section).
    basicAuth: true
    basicAuthUser: ${OPENSEARCH_USERNAME}
    secureJsonData:
      basicAuthPassword: ${OPENSEARCH_PASSWORD}
    jsonData:
      database: otel-logs-*
      flavor: opensearch
      logLevelField: severity.text.keyword
      logMessageField: body
      pplEnabled: true
      timeField: observedTimestamp
      version: 3.6.0
