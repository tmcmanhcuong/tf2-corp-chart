apiVersion: v2
type: application
name: techx-corp
version: 0.48.5
description: TechX Corp platform helm chart
maintainers:
  - name: TechX Corp Platform Team
appVersion: 2.2.0
dependencies:
  - name: opentelemetry-collector
    version: 0.153.0
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: opentelemetry-collector.enabled
  - name: jaeger
    version: 4.7.0
    repository: https://jaegertracing.github.io/helm-charts
    condition: jaeger.enabled
  - name: prometheus
    version: 29.6.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 12.3.0
    repository: https://grafana-community.github.io/helm-charts
    condition: grafana.enabled
  - name: metrics-server
    version: 3.13.1
    repository: https://kubernetes-sigs.github.io/metrics-server/
    condition: metrics-server.enabled
  # Custom metrics API for request-rate (RPS) HPA; Metrics Server remains for CPU/memory.
  - name: prometheus-adapter
    version: 5.3.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus-adapter.enabled
# Change trail: @hungxqt - 2026-07-15 - Chart 0.48.5: fix AI model fetch init HOME on RO root.
