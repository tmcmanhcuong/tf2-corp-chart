# Enable internet-facing ALB for frontend-proxy (storefront only).
#
# Security posture when blockSensitivePaths=true (default):
#   ALLOWED:  / , /api/* , /images/*
#   BLOCKED:  /grafana, /jaeger, /loadgen, /feature, /flagservice, /otlp-http  → HTTP 403
#
# Toggle path blocking off:
#   helm ... -f values-public-alb.yaml \
#     --set components.frontend-proxy.publicAlb.blockSensitivePaths=false
#
# Or use Terraform (techx-corp-infra) variable storefront_alb_block_sensitive_paths
# and output storefront_alb_helm_set_flags / storefront_alb_helm_deploy_command.

components:
  frontend-proxy:
    publicAlb:
      enabled: true
      blockSensitivePaths: true
